<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Factory Platform - Dashboard</title>
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-surface: rgba(255, 255, 255, 0.1);
            --bg-overlay: rgba(30, 30, 45, 0.8);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-cyan: #22d3ee;
            --accent-purple: #a855f7;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --border: rgba(255, 255, 255, 0.2);
            --sp-1: 4px;
            --sp-2: 8px;
            --sp-3: 12px;
            --sp-4: 16px;
            --sp-5: 20px;
            --sp-6: 24px;
            --sp-8: 32px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --transition-fast: 150ms ease;
            --transition-normal: 250ms ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--sp-4);
        }

        /* Glass Morphism - Refined */
        .glass-card {
            background: var(--bg-surface);
            backdrop-filter: blur(10px) saturate(180%);
            -webkit-backdrop-filter: blur(10px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--sp-4);
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent,
                var(--accent-cyan),
                transparent
            );
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 20px var(--accent-cyan), 0 8px 32px rgba(34, 211, 238, 0.3);
        }

        /* Neon Accents - Enhanced */
        .neon-glow {
            box-shadow:
                0 0 10px #22d3ee,
                0 0 20px #a855f7;
            border: 1px solid var(--accent-cyan);
        }

        .neon-glow-purple {
            box-shadow:
                0 0 10px #a855f7,
                0 0 20px #22d3ee;
            border: 1px solid var(--accent-purple);
        }

        .neon-border {
            position: relative;
        }

        .neon-border::after {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: linear-gradient(
                135deg,
                var(--accent-cyan),
                var(--accent-purple),
                var(--accent-cyan)
            );
            border-radius: var(--radius-lg);
            z-index: -1;
            opacity: 0.3;
        }

        /* Status Animations - Enhanced */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; box-shadow: 0 0 15px var(--accent-cyan); }
        }

        .status-running {
            animation: pulse 2s infinite;
            color: var(--accent-cyan);
            text-shadow: 0 0 5px var(--accent-cyan);
        }

        .status-ready { color: var(--success); }
        .status-stopped { color: var(--warning); }
        .status-failed { color: var(--error); }

        /* Neon Text */
        .neon-text {
            text-shadow:
                0 0 5px var(--accent-cyan),
                0 0 10px var(--accent-purple);
        }

        /* Glass Buttons */
        .glass-button {
            background: var(--bg-surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--sp-2) var(--sp-4);
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--transition-normal);
            font-size: 14px;
        }

        .glass-button:hover {
            background: rgba(34, 211, 238, 0.1);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        .glass-button.active {
            background: rgba(34, 211, 238, 0.2);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-cyan);
        }

        /* Layout Components */
        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .grid-layout {
            display: grid;
            gap: var(--sp-4);
        }

        .grid-3-col {
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        }

        .grid-2-col {
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
        }

        /* Agent Card Specific - Enhanced */
        .agent-card {
            position: relative;
            min-height: 220px;
            transition: all var(--transition-normal);
        }

        .agent-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 20px var(--accent-cyan);
        }

        .agent-avatar {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: absolute;
            top: var(--sp-2);
            left: var(--sp-2);
            box-shadow: 0 0 10px var(--accent-cyan);
            border: 2px solid var(--bg-deep);
        }

        .agent-status {
            position: absolute;
            top: var(--sp-2);
            right: var(--sp-2);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .agent-main-status {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: var(--sp-1);
            text-shadow: 0 0 5px currentColor;
        }

        .agent-sub-status {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: var(--sp-2);
        }

        .agent-task {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            padding: 0 var(--sp-2);
        }

        .agent-task h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: var(--sp-1);
            color: var(--text-primary);
            text-shadow: 0 0 3px var(--accent-cyan);
        }

        .agent-task p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .agent-mode {
            position: absolute;
            bottom: var(--sp-2);
            left: var(--sp-2);
            font-size: 10px;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.3);
            padding: var(--sp-1) var(--sp-2);
            border-radius: var(--radius-sm);
        }

        .agent-context {
            position: absolute;
            bottom: var(--sp-2);
            right: var(--sp-2);
            width: 80px;
        }

        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .progress-low { background: var(--success); }
        .progress-medium { background: var(--warning); }
        .progress-high { background: var(--error); }

        .agent-last-run {
            position: absolute;
            bottom: var(--sp-2);
            left: var(--sp-2);
            right: var(--sp-2);
            font-size: 10px;
            color: var(--text-secondary);
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: var(--sp-1);
            border-radius: var(--radius-sm);
        }

        /* Timeline Components - Enhanced */
        .timeline-container {
            position: relative;
            padding: var(--sp-4) 0;
            display: flex;
            flex-direction: column;
            gap: var(--sp-3);
            height: 100%;
            overflow-y: auto;
        }

        .timeline-connector {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, transparent, var(--accent-cyan), transparent);
            transform: translateX(-50%);
        }

        .timeline-item {
            position: relative;
            padding: var(--sp-3) var(--sp-4);
            margin-bottom: var(--sp-3);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .timeline-item:hover {
            transform: translateY(-2px);
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            left: 50%;
            top: var(--sp-3);
            width: 12px;
            height: 12px;
            border-radius: var(--radius-full);
            background: var(--accent-cyan);
            transform: translateX(-50%);
            border: 2px solid var(--bg-deep);
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        .timeline-message {
            position: relative;
            z-index: 2;
            padding: var(--sp-2);
            border-radius: var(--radius-md);
            max-width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        .timeline-coordinator {
            background: rgba(168, 85, 247, 0.1);
            margin-left: 0;
            border-left: 3px solid var(--accent-purple);
            box-shadow: -5px 0 15px rgba(168, 85, 247, 0.1);
            align-self: flex-start;
            margin-right: auto;
        }

        .timeline-agent {
            background: rgba(34, 211, 238, 0.1);
            margin-right: 0;
            margin-left: auto;
            border-right: 3px solid var(--accent-cyan);
            box-shadow: 5px 0 15px rgba(34, 211, 238, 0.1);
            align-self: flex-end;
        }

        .timeline-arrow {
            position: absolute;
            top: var(--sp-3);
            width: 20px;
            height: 20px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            transform: rotate(45deg);
            z-index: 1;
        }

        .timeline-coordinator .timeline-arrow {
            left: -12px;
        }

        .timeline-agent .timeline-arrow {
            right: -12px;
        }

        .floating-card {
            position: fixed;
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--sp-3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 100;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .floating-card.hidden {
            display: none;
        }

        .floating-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--sp-2);
            padding-bottom: var(--sp-2);
            border-bottom: 1px solid var(--border);
        }

        .close-floating {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            transition: all var(--transition-fast);
        }

        .close-floating:hover {
            color: var(--accent-cyan);
            transform: rotate(90deg);
        }

        .floating-card-content {
            display: flex;
            flex-direction: column;
            gap: var(--sp-2);
        }

        .interaction-details {
            background: rgba(0, 0, 0, 0.2);
            padding: var(--sp-2);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--accent-cyan);
        }

        .interaction-input, .interaction-output {
            margin-bottom: var(--sp-2);
        }

        .interaction-input h4, .interaction-output h4 {
            color: var(--accent-purple);
            margin-bottom: var(--sp-1);
            font-size: 14px;
        }

        .interaction-output h4 {
            color: var(--accent-cyan);
        }

        .interaction-content {
            background: var(--bg-overlay);
            padding: var(--sp-2);
            border-radius: var(--radius-sm);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 200px;
            overflow-y: auto;
        }

        /* Navigation - Enhanced */
        .nav-menu {
            display: flex;
            gap: var(--sp-2);
            margin-bottom: var(--sp-4);
            padding: var(--sp-2) var(--sp-4);
            background: var(--bg-overlay);
            border-radius: var(--radius-md);
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        .nav-item {
            padding: var(--sp-2) var(--sp-3);
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: var(--sp-1);
        }

        .nav-item.active {
            background: rgba(34, 211, 238, 0.2);
            color: var(--text-primary);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        .nav-item:hover {
            background: rgba(34, 211, 238, 0.1);
        }

        /* Logs Panel - Enhanced */
        .logs-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-overlay);
            padding: var(--sp-2) var(--sp-4);
            display: flex;
            gap: var(--sp-2);
            overflow-x: auto;
            z-index: 50;
            border-bottom: 1px solid var(--border);
        }

        .log-filter {
            padding: var(--sp-1) var(--sp-2);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all var(--transition-fast);
        }

        .log-filter.active {
            background: rgba(34, 211, 238, 0.2);
            border-color: var(--accent-cyan);
            color: var(--text-primary);
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        .log-filter:hover {
            background: rgba(34, 211, 238, 0.1);
        }

        /* Timeline Sidebar */
        .timeline-sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 400px;
            height: 100vh;
            background: var(--bg-overlay);
            backdrop-filter: blur(16px);
            border-left: 1px solid var(--border);
            transform: translateX(100%);
            transition: transform var(--transition-normal);
            z-index: 60;
            display: flex;
            flex-direction: column;
        }

        .timeline-sidebar.active {
            transform: translateX(0);
        }

        .timeline-sidebar-header {
            padding: var(--sp-3) var(--sp-4);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timeline-sidebar-title {
            font-size: 18px;
            font-weight: 600;
        }

        .close-sidebar {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 20px;
        }

        .timeline-sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--sp-3);
        }

        .timeline-empty-state {
            text-align: center;
            padding: var(--sp-8);
            color: var(--text-secondary);
        }

        /* Logs Panel Content */
        .logs-content {
            margin-top: 40px;
            background: var(--bg-overlay);
            border-radius: var(--radius-md);
            padding: var(--sp-3);
            border: 1px solid var(--border);
        }

        .log-entry {
            padding: var(--sp-2);
            border-bottom: 1px solid var(--border);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .log-entry.info {
            color: var(--text-secondary);
        }

        .log-entry.warning {
            color: var(--warning);
        }

        .log-entry.error {
            color: var(--error);
        }

        .log-entry.debug {
            color: var(--accent-cyan);
        }

        /* Debug Panel Content */
        .debug-content {
            margin-top: 40px;
            background: var(--bg-overlay);
            border-radius: var(--radius-md);
            padding: var(--sp-3);
            border: 1px solid var(--border);
        }

        .debug-section {
            margin-bottom: var(--sp-3);
        }

        .debug-section h3 {
            color: var(--accent-purple);
            margin-bottom: var(--sp-2);
            font-size: 14px;
        }

        .debug-data {
            background: var(--bg-surface);
            padding: var(--sp-2);
            border-radius: var(--radius-sm);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 300px;
            overflow-y: auto;
        }

        /* Events Panel Content */
        .events-content {
            margin-top: 40px;
            background: var(--bg-overlay);
            border-radius: var(--radius-md);
            padding: var(--sp-3);
            border: 1px solid var(--border);
        }

        .event-item {
            padding: var(--sp-2);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .event-item.coordinator {
            background: rgba(168, 85, 247, 0.1);
            border-left: 3px solid var(--accent-purple);
        }

        .event-item.agent {
            background: rgba(34, 211, 238, 0.1);
            border-left: 3px solid var(--accent-cyan);
        }

        .event-timestamp {
            color: var(--text-secondary);
            font-size: 10px;
            margin-bottom: var(--sp-1);
        }

        .event-message {
            color: var(--text-primary);
        }

        /* Responsive - Enhanced */
        @media (max-width: 1024px) {
            .grid-3-col, .grid-2-col {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            }

            .timeline-sidebar {
                width: 350px;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: var(--sp-2);
            }

            .grid-3-col, .grid-2-col {
                grid-template-columns: 1fr;
            }

            .timeline-sidebar {
                width: 100%;
            }

            .timeline-coordinator {
                margin-left: 10%;
            }

            .timeline-agent {
                margin-right: 10%;
            }

            .nav-menu {
                padding: var(--sp-1) var(--sp-2);
            }

            .nav-item {
                padding: var(--sp-1) var(--sp-2);
                font-size: 14px;
            }

            .logs-panel {
                flex-direction: column;
                padding: var(--sp-2);
            }

            .log-filter {
                width: 100%;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: var(--sp-2);
            }

            .agent-avatar {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .agent-main-status {
                font-size: 16px;
            }

            .timeline-sidebar {
                width: 100%;
            }

            .timeline-sidebar-header {
                flex-direction: column;
                gap: var(--sp-2);
            }
        }
    </style>
</head>
<body>
    <!-- Navigation State -->
    <div id="app-state" class="hidden">projects</div>
    <div id="current-project" class="hidden"></div>
    <div id="current-team" class="hidden"></div>

    <!-- Logs Panel -->
    <div id="logs-panel" class="logs-panel hidden">
        <button class="log-filter active" data-filter="all">Todos</button>
        <button class="log-filter" data-filter="error">Erros</button>
        <button class="log-filter" data-filter="warning">Avisos</button>
        <button class="log-filter" data-filter="info">Informações</button>
        <button class="log-filter" data-filter="debug">Debug</button>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Projects View -->
        <div id="projects-view" class="view active">
            <h1 class="text-3xl font-bold text-center mb-8 neon-text">Agent Factory Platform</h1>

            <div id="projects-grid" class="grid-layout grid-3-col">
                <!-- Projects will be loaded here -->
            </div>
        </div>

        <!-- Teams View -->
        <div id="teams-view" class="view">
            <div class="nav-menu">
                <button class="nav-item glass-button" data-view="projects">
                    <span>🏠</span> Projetos
                </button>
                <button class="nav-item glass-button active" data-view="teams">
                    <span>👥</span> Times
                </button>
            </div>

            <h2 id="teams-title" class="text-2xl font-bold mb-6 neon-text"></h2>

            <div id="teams-grid" class="grid-layout grid-2-col">
                <!-- Teams will be loaded here -->
            </div>
        </div>

        <!-- Agents View -->
        <div id="agents-view" class="view">
            <div class="nav-menu">
                <button class="nav-item glass-button" data-view="projects">
                    <span>🏠</span> Projetos
                </button>
                <button class="nav-item glass-button" data-view="teams">
                    <span>👥</span> Times
                </button>
                <button class="nav-item glass-button active" data-view="agents">
                    <span>🤖</span> Agentes
                </button>
                <button id="timeline-toggle" class="nav-item glass-button">
                    <span>📊</span> Timeline
                </button>
            </div>

            <h2 id="agents-title" class="text-2xl font-bold mb-6 neon-text"></h2>

            <div id="agents-grid" class="grid-layout grid-3-col">
                <!-- Agents will be loaded here -->
            </div>
        </div>

        <!-- Logs View -->
        <div id="logs-view" class="view">
            <div class="nav-menu">
                <button class="nav-item glass-button active" data-view="logs">
                    <span>📝</span> Logs
                </button>
                <button class="nav-item glass-button" data-view="debug">
                    <span>🐛</span> Debug
                </button>
                <button class="nav-item glass-button" data-view="events">
                    <span>📡</span> Events
                </button>
            </div>

            <h2 class="text-2xl font-bold mb-6 neon-text">Logs e Debug</h2>

            <!-- Logs Content -->
            <div id="logs-content" class="logs-content">
                <div class="logs-table">
                    <!-- Log entries will be loaded here -->
                </div>
            </div>

            <!-- Debug Content -->
            <div id="debug-content" class="debug-content hidden">
                <div class="debug-section">
                    <h3>Dados dos Agentes</h3>
                    <div id="agents-debug-data" class="debug-data"></div>
                </div>
                <div class="debug-section">
                    <h3>Dados do Sistema</h3>
                    <div id="system-debug-data" class="debug-data"></div>
                </div>
            </div>

            <div id="events-content" class="events-content hidden">

            teamsGrid: document.getElementById('teams-grid'),

            logFilters: document.querySelectorAll('.log-filter'),

            // Controls
            closeFloating: document.querySelector('.close-floating'),
            navItems: document.querySelectorAll('.nav-item')
        };

        // Initialize the dashboard - Refactored with clear flow
        async function init() {
            try {
                // Load initial data
                await loadProjects();
                await loadMissions();
                await loadSystemData();

                // Setup event listeners
                setupNavigation();
                setupEventSource();
                setupLogsPanel();
                setupFloatingCard();
                setupTimelineSidebar();

                // Show appropriate view based on state
                updateView();

                // Log initialization
                console.log('Dashboard initialized successfully');
            } catch (error) {
                console.error('Failed to initialize dashboard:', error);
                logError('Falha ao inicializar o dashboard');
            }
        }

        // Data Loading Functions - Refactored with error handling
        async function loadProjects() {
            try {
                const response = await fetch('/api/projects');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                state.projects = await response.json();
                renderProjects();
            } catch (error) {
                console.error('Error loading projects:', error);
                logError(`Falha ao carregar projetos: ${error.message}`);
                showErrorMessage('Não foi possível carregar os projetos');
            }
        }

        async function loadMissions() {
            try {
                const response = await fetch('/api/missions');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                state.missions = await response.json();
            } catch (error) {
                console.error('Error loading missions:', error);
                logError(`Falha ao carregar missões: ${error.message}`);
            }
        }

        async function loadSystemData() {
            try {
                // Load system status
                const statusResponse = await fetch('/api/status');
                if (statusResponse.ok) {
                    const systemStatus = await statusResponse.json();
                    state.systemStatus = systemStatus;
                }

                // Load context data
                const contextResponse = await fetch('/api/context');
                if (contextResponse.ok) {
                    const contextData = await contextResponse.json();
                    state.contextData = contextData;
                }
            } catch (error) {
                console.error('Error loading system data:', error);
                logError(`Falha ao carregar dados do sistema: ${error.message}`);
            }
        }

        // Log Management Functions
        function logInfo(message) {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] [INFO] ${message}`;
            state.logs.push({ type: 'info', message: logEntry });
            renderLogs();
        }

        function logWarning(message) {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] [WARNING] ${message}`;
            state.logs.push({ type: 'warning', message: logEntry });
            renderLogs();
        }

        function logError(message) {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] [ERROR] ${message}`;
            state.logs.push({ type: 'error', message: logEntry });
            renderLogs();
        }

        function logDebug(message) {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] [DEBUG] ${message}`;
            state.logs.push({ type: 'debug', message: logEntry });
            renderLogs();
        }

        function renderLogs() {
            if (!state.logs.length) return;

            const logsTable = elements.logsContent.querySelector('.logs-table');
            logsTable.innerHTML = '';

            state.logs.forEach(log => {
                const logEntry = document.createElement('div');
                logEntry.className = `log-entry ${log.type}`;
                logEntry.textContent = log.message;
                logsTable.appendChild(logEntry);
            });
        }

        function filterLogs(filter) {
            const logsTable = elements.logsContent.querySelector('.logs-table');
            logsTable.innerHTML = '';

            state.logs.filter(log => {
                if (filter === 'all') return true;
                return log.type === filter;
            }).forEach(log => {
                const logEntry = document.createElement('div');
                logEntry.className = `log-entry ${log.type}`;
                logEntry.textContent = log.message;
                logsTable.appendChild(logEntry);
            });
        }

            if (state.agents && state.agents.length > 0) {
                const agentsDebugData = document.getElementById('agents-debug-data');

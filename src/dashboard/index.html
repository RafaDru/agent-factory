<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Factory Platform — Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        /* Variáveis globais (independem do tema) */
        :root {
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --radius-full: 9999px;
            --transition-smooth: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ========== TEMA DARK (padrão) ========== */
        :root[data-theme="dark"] {
            --bg: #0a0a0f;
            --bg-card: rgba(16, 16, 26, 0.7);
            --bg-card-hover: rgba(22, 22, 36, 0.8);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.06);
            --border-neon-cyan: rgba(34, 211, 238, 0.3);
            --border-neon-purple: rgba(168, 85, 247, 0.3);
            --cyan: #22d3ee;
            --cyan-glow: rgba(34, 211, 238, 0.5);
            --purple: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.5);
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --orange: #f97316;
            --blue: #3b82f6;
            --blue-rgb: 59, 130, 246;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --cyan-rgb: 34, 211, 238;
            --purple-rgb: 168, 85, 247;
            --text-primary-rgb: 241, 245, 249;
            --grid-line: rgba(255, 255, 255, 0.015);
            --card-shadow: none;
            --card-hover-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }

        /* ========== TEMA LIGHT ========== */
        :root[data-theme="light"] {
            --bg: #f8f9fa;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f3f5;
            --bg-glass: rgba(0, 0, 0, 0.02);
            --border-glass: rgba(0, 0, 0, 0.08);
            --border-neon-cyan: rgba(8, 145, 178, 0.2);
            --border-neon-purple: rgba(124, 58, 237, 0.2);
            --cyan: #0891b2;
            --cyan-glow: rgba(8, 145, 178, 0.25);
            --purple: #7c3aed;
            --purple-glow: rgba(124, 58, 237, 0.25);
            --green: #16a34a;
            --yellow: #ca8a04;
            --red: #dc2626;
            --orange: #ea580c;
            --blue: #3b82f6;
            --blue-rgb: 59, 130, 246;
            --text-primary: #1a1a2e;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --cyan-rgb: 8, 145, 178;
            --purple-rgb: 124, 58, 237;
            --text-primary-rgb: 26, 26, 46;
            --grid-line: rgba(0, 0, 0, 0.05);
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --card-hover-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: var(--font-family);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 10%, rgba(var(--cyan-rgb), 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 60%, rgba(var(--purple-rgb), 0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 90%, rgba(var(--cyan-rgb), 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        #app {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 28px;
            margin-bottom: 32px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            position: sticky;
            top: 24px;
            z-index: 100;
            transition: var(--transition-smooth);
        }

        .header:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: var(--card-hover-shadow);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.25), 0 0 60px rgba(168, 85, 247, 0.15);
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-nav {
            display:flex; gap:4px; align-items:center; margin-left:20px; padding-left:20px;
            border-left:1px solid var(--border-glass);
        }
        .header-nav a {
            padding:6px 14px; border-radius:var(--radius-sm); color:var(--text-secondary);
            font-size:0.85rem; font-weight:500; cursor:pointer; transition:var(--transition-smooth);
            text-decoration:none;
        }
        .header-nav a:hover, .header-nav a.active {
            background:var(--bg-glass); color:var(--cyan);
        }
        .project-selector {
            background:var(--bg-glass); color:var(--text-secondary); border:1px solid var(--border-glass);
            border-radius:var(--radius-sm); padding:5px 10px; font-size:0.8rem; cursor:pointer;
            margin-left:12px; transition:var(--transition-smooth); max-width:160px;
        }
        .project-selector:hover { border-color:var(--border-neon-cyan); color:var(--text-primary); }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--transition-smooth);
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border-neon-cyan);
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        .btn-back {
            display: none;
        }

        .breadcrumb {
            margin-bottom: 24px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .breadcrumb span {
            cursor: pointer;
            transition: color 0.2s;
        }

        .breadcrumb span:hover {
            color: var(--cyan);
        }

        .breadcrumb .separator {
            color: var(--text-muted);
            cursor: default;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .project-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 28px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
            opacity: 0;
            transition: opacity 0.35s;
        }

        .project-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.15), 0 0 60px rgba(168, 85, 247, 0.1);
            border-color: var(--border-neon-cyan);
            background: var(--bg-card-hover);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-name {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--text-primary), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .project-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 500;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--cyan);
        }

        .stat-value.purple {
            color: var(--purple);
        }

        .active-agents {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

                .last-execution-section {
            margin-top: 32px;
            margin-bottom: 24px;
            padding: 24px;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
        }

        .last-execution-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .execution-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: var(--bg-glass);
            border: 1px solid var(--border-glass); border-radius: var(--radius-sm);
            cursor: pointer; transition: var(--transition-smooth);
        }
        .execution-card:hover { border-color: var(--border-neon-cyan); box-shadow: 0 0 15px var(--cyan-glow); }
        .execution-info { display: flex; flex-direction: column; gap: 4px; }
        .execution-project { font-weight: 600; color: var(--text-primary); }
        .execution-details { font-size: 0.85rem; color: var(--text-secondary); }
        .execution-status { font-size: 0.8rem; font-weight: 600; padding: 4px 10px; border-radius: var(--radius-full); }
        .execution-status.success { background: rgba(34,197,94,0.2); color: var(--green); }
        .execution-status.failed { background: rgba(239,68,68,0.2); color: var(--red); }
        .execution-status.running { background: rgba(59,130,246,0.2); color: var(--blue); }
        .no-execution { text-align: center; color: var(--text-muted); padding: 20px; }

        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .agents-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .agent-card {
            background: var(--bg-card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: var(--radius-md);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 14px;
            position: relative;
            transition: var(--transition-smooth);
            overflow: hidden;
        }

        .agent-card.running {
            border-color: var(--green);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.1);
            animation: pulse-border 1.5s infinite;
        }

        .agent-card.failed {
            border-color: var(--red);
        }

        .agent-card.stopped {
            border-color: var(--yellow);
        }

        .agent-card.ready {
            border-color: var(--cyan);
        }

        .agent-card-header {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 16px;
        }
        .agent-log-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            opacity: 0.6;
        }
        .agent-log-btn:hover {
            opacity: 1;
        }

        .agent-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .agent-card.running .agent-avatar {
            border-color: var(--green);
            animation: avatarPulse 2s infinite;
        }

        @keyframes avatarPulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0.1); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        @keyframes flash-green {
            0% { background-color: rgba(34, 197, 94, 0.3); }
            100% { background-color: transparent; }
        }

        .agent-card.flash-success {
            animation: flash-green 0.5s ease-out;
        }

        .agent-card.running .task-name {
            color: var(--green);
            font-weight: 700;
            text-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        }

        .agent-info {
            flex: 1;
        }

        .agent-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .agent-role {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .agent-status {
            display: inline-block;
            padding: 2px 6px;
            border-radius: var(--radius-full);
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        .dot-success { background: var(--green); }
        .dot-running { background: var(--blue); }
        .dot-failed { background: var(--red); }
        .dot-idle { background: var(--text-muted); }

        .agent-card.success {
            border-color: var(--green);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.1);
        }

        .status-running {
            background: rgba(59, 130, 246, 0.2);
            color: var(--blue);
            border: 1px solid var(--blue);
            animation: pulse 2s infinite;
        }

        .status-success {
            background: rgba(34, 197, 94, 0.2);
            color: var(--green);
            border: 1px solid var(--green);
        }

        .status-failed {
            background: rgba(239, 68, 68, 0.2);
            color: var(--red);
            border: 1px solid var(--red);
        }

        .status-idle {
            background: rgba(100, 116, 139, 0.2);
            color: var(--text-muted);
            border: 1px solid var(--text-muted);
        }

        .last-task-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: var(--radius-xs);
            opacity: 0.8;
            display: inline-block;
            margin-top: 4px;
        }
        .last-task-badge.status-success {
            background: rgba(34, 197, 94, 0.2);
            color: var(--green);
            border: 1px solid var(--green);
        }
        .last-task-badge.status-failed {
            background: rgba(239, 68, 68, 0.2);
            color: var(--red);
            border: 1px solid var(--red);
        }
        .last-task-badge.status-idle {
            background: rgba(100, 116, 139, 0.2);
            color: var(--text-muted);
            border: 1px solid var(--text-muted);
        }

        .sub-status {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sub-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--cyan);
        }

        .task-center {
            text-align: center;
            margin: 16px 0;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-sm);
        }

        .task-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .mission-name {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .llm-mode {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin: 12px 0;
        }

        .llm-select {
            background: var(--bg-glass);
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xs);
            padding: 4px 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            flex: 1;
            margin-left: 8px;
        }
        .llm-select:hover {
            border-color: var(--border-neon-cyan);
        }
        .llm-select:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 0 2px var(--cyan-glow);
        }

        .llm-badge {
            background: rgba(34, 211, 238, 0.15);
            color: var(--cyan);
            padding: 2px 8px;
            border-radius: var(--radius-xs);
            font-weight: 600;
        }

        .context-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .context-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease, background 0.5s;
        }

        .context-low { background: var(--green); }
        .context-medium { background: var(--yellow); }
        .context-high { background: var(--red); }

        .context-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: right;
        }

        .last-execution {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-glass);
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .last-execution span {
            white-space: nowrap;
        }

        .last-model {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .last-model span {
            color: var(--cyan);
            font-weight: 500;
        }

        .timer {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--cyan);
            margin-top: 8px;
            font-variant-numeric: tabular-nums;
        }

        .loading, .error, .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1rem;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error {
            color: var(--red);
        }

                .team-section {
            margin-bottom: 16px;
        }
        .team-section h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

@media (max-width: 768px) {
            #app {
                padding: 16px;
            }

            .projects-grid, .agents-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 14px 16px;
            }

            .logo-text {
                font-size: 1.1rem;
            }
        }
    /* ========== LOGS PANEL ========== */
    #logs-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1000;
        max-width: 800px;
        width: 90%;
        height: 70vh;
        max-height: 400px;
        border-radius: var(--radius-lg);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: var(--transition-smooth);
    }

    /* Tema escuro: glass morphism */
    :root[data-theme="dark"] #logs-panel {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);

<script>

        const L = {
            back: 'Back',
            refresh: 'Refresh',
            logs: 'Logs',
            agents: 'AGENTS',
            active: 'ACTIVE',
            agent: 'Agent',
            idle: 'IDLE',
            success: 'SUCCESS',
            failed: 'FAILED',
            running: 'RUNNING',
            noActiveTask: 'No active task',
            llm: 'LLM:',
            interactionFlow: 'Interaction Flow',
            noInteractions: 'No interactions yet',
            timeline: 'Timeline',
            eventLogs: 'Event Logs',
            allAgents: 'All Agents',
            allTypes: 'All Types',
            close: 'Close',
            clear: 'Clear',
            projects: 'Projects',
            lastExecution: 'Last Execution',
            noRecentExecutions: 'No recent executions',
            noExecutionsYet: 'No executions yet',
            last: 'Last:',
            filteredBy: 'Filtered by:',
            noAgents: 'No agents',
            agentsRunning: 'agents running',
            executing: 'Executing...',
            mission: 'Mission:',
            uncategorized: 'Uncategorized',
        };
        // ==================== HELPERS ====================
        function agentKey(projectId, agentId) {
            return projectId + ':' + agentId;
        }

        // ==================== STATE MANAGEMENT ====================
        const state = {
            projects: [],
            missions: [],
            missionsData: {},
            agentsState: {}, // agentId -> { status, subStatus, task, mission, timer, context, lastExecution, events }
            currentView: 'projects',
            currentProjectId: null,
            projectTab: 'agents',
            navigationStack: [],
            sseConnection: null,
            connectionStatus: 'connecting',
            eventTimers: {} // agentId -> intervalId
        };

        // ==================== API ====================
        const API = {
            async fetchProjects() {
                const res = await fetch('/api/projects');
                if (!res.ok) throw new Error('Failed to fetch projects');
                return res.json();
            },
            async fetchMissions() {
                const res = await fetch('/api/missions');
                if (!res.ok) throw new Error('Failed to fetch missions');
                return res.json();
            },
            async fetchContext(projectId) {
                const res = await fetch('/api/context?project=' + encodeURIComponent(projectId));
                if (!res.ok) throw new Error('Failed to fetch context');
                return res.json();
            },
            connectSSE() {
                if (state.sseConnection) {
                    state.sseConnection.close();
                }
                state.connectionStatus = 'connecting';
                const es = new EventSource('/api/events/stream');
                es.onopen = () => {
                    state.connectionStatus = 'connected';
                    console.log('SSE connected');
                };
                es.onerror = () => {
                    state.connectionStatus = 'error';
                    console.warn('SSE connection error, reconnecting...');
                    setTimeout(() => API.connectSSE(), 5000);
                };
                es.addEventListener('agent_event', (e) => {
                    try {
                        const event = JSON.parse(e.data);
                        handleAgentEvent(event);
                    } catch (err) {
                        console.error('Error parsing SSE event:', err);
                    }
                });
                state.sseConnection = es;
            }
        };

        // ==================== EVENT HANDLING ====================
        function handleAgentEvent(event) {
            const agentId = event.agent_id;
            const projectId = event.project_id || state.currentProjectId || 'unknown';
            const key = agentKey(projectId, agentId);
            if (!agentId) return;

            if (!state.agentsState[key]) {
                state.agentsState[key] = {
                    status: 'ready',
                    subStatus: '',
                    task: null,
                    mission: null,
                    timer: 0,
                    timerStart: null,
                    context: 0,
                    lastExecution: null,
                    lastTaskStatus: null,
                    events: []
                };
            }

            const agentState = state.agentsState[key];

            if (event.status) {
                agentState.status = event.status.toLowerCase();
                if (agentState.status === 'running' && !agentState.timerStart) {
                    agentState.timerStart = Date.now();
                    if (state.eventTimers[key]) clearInterval(state.eventTimers[key]);
                    state.eventTimers[key] = setInterval(() => updateTimer(key), 1000);
                } else if (agentState.status !== 'running') {
                    if (state.eventTimers[key]) {
                        clearInterval(state.eventTimers[key]);
                        delete state.eventTimers[key];
                    }
                    agentState.timerStart = null;
                    agentState.timer = 0;
                }
                // Flash success on completion
                if (agentState.status === 'completed' || agentState.status === 'success') {
                    agentState.flashSuccess = true;
                } else {
                    agentState.flashSuccess = false;
                }

                if (agentState.status === 'completed' || agentState.status === 'success') {
                    agentState.lastTaskStatus = 'success';
                } else if (agentState.status === 'failed') {
                    agentState.lastTaskStatus = 'failed';
                }

                // Reset to idle after 5 seconds on completion
                if (event.status === 'completed' || event.status === 'success') {
                    if (state._idleTimers && state._idleTimers[key]) clearTimeout(state._idleTimers[key]);
                    if (!state._idleTimers) state._idleTimers = {};
                    state._idleTimers[key] = setTimeout(() => {
                        if (state.agentsState[key]) {
                            state.agentsState[key].status = 'ready';
                            const card = document.getElementById('agent-' + key);
                            if (card) updateAgentCardUI(key);
                        }
                    }, 5000);
                }
            }

            if (event.sub_status || event.message) {
                agentState.subStatus = event.sub_status || event.message.toLowerCase();
            }

            if (event.task_id) agentState.task = event.task_id;
            if (event.mission_id) agentState.mission = event.mission_id;
            else if (event.payload && event.payload.mission) agentState.mission = event.payload.mission;

            if (event.metrics) {
                if (event.metrics.context !== undefined) {
                    agentState.context = event.metrics.context;
                }
            }

            const model = event.metrics?.model 
                || (event.metrics?.provider ? `${event.metrics.provider}/${event.metrics.model || ''}` : null)
                || (event.payload?.model)
                || (agentState.llmConfig?.provider)
                || null;
            agentState.llmConfig = { provider: event.metrics?.provider || null };
            agentState.lastExecution = {
                timestamp: event.timestamp || new Date().toISOString(),
                mission: agentState.mission,
                task: agentState.task,
                status: agentState.status,
                duration: event.metrics?.duration_ms || 0,
                model: model
            };

            agentState.events.unshift({
                id: Date.now(),
                type: event.agent_id.includes('coordinator') ? 'coordinator' : 'agent',
                actor: event.agent_id,
                message: event.message || event.status,
                payload: event.payload,
                timestamp: event.timestamp || new Date().toISOString(),
                taskId: event.task_id || event.trace_id || null,
                missionId: event.mission_id || null,
                status: event.status
            });

            if (agentState.events.length > 250) agentState.events.pop();

            if (state.currentView === 'team-detail') {
                const card = document.getElementById('agent-' + key);
                if (card) {
                    updateAgentCardUI(key);
                } else {
                    renderTeamDetail();
                }
            }

            // Add to logs panel
            if (typeof addLogEntry === 'function') {
                addLogEntry(event);
            }

            // Rebuild mission data from events
            updateMissionsData();

            // Re-render mission control if we're on that view
            if (state.currentView === 'live') {
                renderGlobalMissionControl();
            } else if (state.currentView === 'team-detail' && state.projectTab === 'mission-control') {
                renderTeamDetail();
            }
        }

        function updateMissionsData() {
            const allEvents = [];
            Object.values(state.agentsState).forEach(aState => {
                if (aState.events) {
                    aState.events.forEach(evt => allEvents.push(evt));
                }
            });
            allEvents.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            const missionsData = {};
            let currentMissionId = null;
            let currentMissionObj = null;

            // Pre-seed from API missions data for objectives
            const apiMissions = {};
            if (Array.isArray(state.missions)) {
                state.missions.forEach(m => {
                    apiMissions[m.id || m.mission_id || ''] = {
                        objective: m.objective || m.objetivo || '',
                        status: m.status || 'unknown'
                    };
                });
            }

            allEvents.forEach(event => {
                const msg = event.message || '';
                const agentId = event.actor || event.agentId || '?';
                const isCoordinator = agentId.toLowerCase().includes('coorden');

                // Detect mission scope from "Missao 'xxx':" or explicit missionId
                let missionId = event.missionId;

                if (!missionId && isCoordinator) {
                    const mm = msg.match(/Missao\s+'([^']+)'/i);
                    if (mm) {
                        missionId = mm[1];
                        currentMissionId = missionId;
                        currentMissionObj = missionId;
                    }
                }

                // If event has no missionId but we're in a mission scope, use current
                if (!missionId && currentMissionId) {
                    missionId = currentMissionId;
                }

                // If still no missionId, try to infer from message
                if (!missionId && isCoordinator && msg.toLowerCase().includes('missao')) {
                    const m2 = msg.match(/'([^']+)'/);
                    if (m2) {
                        missionId = m2[1];
                        currentMissionId = missionId;
                        currentMissionObj = missionId;
                    }
                }

                if (!missionId) return;

                if (!missionsData[missionId]) {
                    const apiObj = apiMissions[missionId] || {};
                    missionsData[missionId] = {
                        id: missionId,
                        projectId: event.payload?.project_id || state.currentProjectId || 'unknown',
                        objective: apiObj.objective || '',
                        status: apiObj.status === 'completed' ? 'completed' : 'running',
                        timestamp: event.timestamp,
                        tasks: {}
                    };
                }
                const mission = missionsData[missionId];

                // Extract objective from coordinator messages
                if (isCoordinator) {
                    const objMatch = msg.match(/Missao\s+'[^']+':\s*([^\.]+)/i);
                    if (objMatch) {
                        const captured = objMatch[1].trim();
                        // Only use regex if meaningful (not just "N tarefas") AND no API objective exists
                        if (!/^\d+\s*tarefas?$/i.test(captured) && !mission.objective) {
                            mission.objective = captured;
                        }
                    }
                    if (event.payload?.objective) {
                        mission.objective = event.payload.objective;
                    }
                }

                // Detect delegation: Passo 'desc' -> agent  OR  Delegando 'action' para agent
                if (isCoordinator) {
                    let match = msg.match(/Passo\s+'(.+?)'\s*->\s*(\w+)/i);
                    if (!match) match = msg.match(/Delegando\s+'([^']+)'\s+para\s+(\w+)/i);
                    if (!match) match = msg.match(/Delegando\s+para\s+(\w+):?\s*(.*)/i);

                    if (match) {
                        let taskName, targetAgent;
                        if (match[2] && (match[1] || match[2])) {
                            // First pattern: Passo 'desc' -> agent
                            taskName = match[1]?.trim() || match[2]?.trim() || msg;
                            targetAgent = match[2]?.trim() || '?';
                        } else {
                            // Legacy: Delegando para agent: desc
                            targetAgent = match[1];
                            taskName = match[2]?.trim() || event.payload?.task || msg;
                        }
                        // Sanitize: if taskName ends up being the agent name, use full msg
                        if (taskName === targetAgent) taskName = msg;
                        const taskKey = taskName.substring(0, 60);

                        if (!mission.tasks[taskKey]) {
                            mission.tasks[taskKey] = {
                                id: taskKey,
                                name: taskName,
                                agent: targetAgent,
                                requestedBy: agentId,
                                status: 'running',
                                events: []
                            };
                        }
                        mission.tasks[taskKey].events.push(event);
                        mission.tasks[taskKey].status = 'running';
                        mission.tasks[taskKey].agent = targetAgent;
                        currentMissionId = missionId;
                    }
                }

                // Assign event to current task within mission scope
                if (missionId === currentMissionId) {
                    const taskKeys = Object.keys(mission.tasks);
                    if (taskKeys.length > 0) {
                        const lastTaskKey = taskKeys[taskKeys.length - 1];
                        const task = mission.tasks[lastTaskKey];
                        if (task.events[task.events.length - 1] !== event) {
                            task.events.push(event);
                        }
                        const st = (event.status || '').toLowerCase();
                        if (st === 'completed' || st === 'success') {
                            if (task.status !== 'failed') task.status = 'completed';
                        } else if (st === 'failed') {
                            task.status = 'failed';
                            if (!task.name || task.name === task.id) {
                                task.name = msg;
                            }
                        } else if (st === 'running') {
                            if (task.status !== 'completed' && task.status !== 'failed') task.status = 'running';
                        }
                        if (agentId !== '?' && task.agent !== agentId && !isCoordinator) {
                            task.agent = agentId;
                        }
                        if (isCoordinator && msg.toLowerCase().includes('concluido')) {
                            // Mark all running tasks as completed when coordinator says concluido
                            Object.values(mission.tasks).forEach(t => {
                                if (t.status === 'running') t.status = 'completed';
                            });
                        }
                    }
                }

                // Update mission aggregate status
                const tasks = Object.values(mission.tasks);
                if (tasks.some(t => t.status === 'running')) {
                    mission.status = 'running';
                } else if (tasks.some(t => t.status === 'failed')) {
                    mission.status = 'failed';
                } else if (tasks.length > 0 && tasks.every(t => t.status === 'completed' || t.status === 'success')) {
                    mission.status = 'completed';
                }
            });

            // Stale cleanup: mark tasks running > 3 min without events as stale
            const STALE_MS = 3 * 60 * 1000;
            const now = Date.now();
            Object.values(missionsData).forEach(mission => {
                const tasks = Object.values(mission.tasks);
                tasks.forEach(task => {
                    if (task.status !== 'running') return;
                    const lastEvt = task.events[task.events.length - 1];
                    if (!lastEvt) return;
                    const lastTime = new Date(lastEvt.timestamp).getTime();
                    if (now - lastTime > STALE_MS) {
                        task.status = 'blocked';
                        task._stale = true;
                    }
                });
                // Recompute aggregate after cleanup
                if (mission.status === 'running') {
                    const t = Object.values(mission.tasks);
                    if (t.length > 0 && t.every(x => x.status === 'completed' || x.status === 'success' || x.status === 'blocked')) {
                        mission.status = 'blocked';
                    }
                }
            });

            // Backfill objectives from API for missions created before API loaded
            Object.entries(apiMissions).forEach(([id, apiObj]) => {
                if (missionsData[id] && !missionsData[id].objective) {
                    missionsData[id].objective = apiObj.objective;
                }
            });

            state.missionsData = missionsData;
        }

        function updateTimer(key) {
            const agentState = state.agentsState[key];
            if (agentState && agentState.timerStart && agentState.status === 'running') {
                const elapsed = Math.floor((Date.now() - agentState.timerStart) / 1000);
                agentState.timer = elapsed;
                const timerEl = document.getElementById(`timer-${key}`);
                if (timerEl) {
                    timerEl.textContent = formatTime(elapsed);
                }
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        async function switchView(view, params = {}) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            const viewEl = document.getElementById(`view-${view}`);
            if (viewEl) viewEl.classList.add('active');

            state.currentView = view;
            state.currentProjectId = params.projectId || null;

            const hash = view === 'projects' ? '#/projects' :
                view === 'team-detail' ? '#/project/' + (params.projectId || '') + '/' + (state.projectTab || 'agents') :
                view === 'live' ? '#/mission-control' :
                view === 'config' ? '#/config' : '#/projects';
            if (window.location.hash !== hash) {
                history.replaceState(null, '', hash);
            }

            updateNavActive();
            populateProjectSelector();
            updateBreadcrumb();
            updateBackButton();
            // Carregar eventos históricos para o mission control
        try {
            const eventsRes = await fetch('/api/events');
            if (eventsRes.ok) {
                const eventsData = await eventsRes.json();
                const events = Array.isArray(eventsData) ? eventsData : (eventsData.events || []);
                events.forEach(event => {
                    const agentId = event.agent_id;
                    const pid = event.project_id || state.currentProjectId || 'unknown'; const key = agentKey(pid, agentId); if (agentId && !state.agentsState[key]) {
                        state.agentsState[key] = { status:'ready', subStatus:'idle', task:null, mission:null, timer:0, timerStart:null, context:0, lastExecution:null, events: [] };
                    }
                    if (agentId && state.agentsState[key]) {
                        const agentState = state.agentsState[key];
                        agentState.events.unshift({
                            id: Date.now() + Math.random(),
                            type: agentId.includes('coordinator') ? 'coordinator' : 'agent',
                            actor: agentId,
                            message: event.message || event.status || 'Event',
                            payload: event.payload,
                            timestamp: event.timestamp || new Date().toISOString(),
                            taskId: event.task_id || event.trace_id || null,
                            missionId: event.mission_id || null,
                            status: event.status
                        });
                        if (agentState.events.length > 250) agentState.events.pop();
                    }
                });
            }
        } catch (err) {
            console.error('Error loading historical events:', err);
        }
        renderCurrentView();
        }

        // ==================== RENDER FUNCTIONS ====================
function safeDate(iso) {
    if (!iso) return null;
    let d = new Date(iso.endsWith('Z') || iso.includes('+') ? iso : iso + 'Z');
    return isNaN(d.getTime()) ? null : d;
}
function formatTimestamp(isoString) {
    const d = safeDate(isoString);
    if (!d) return '';
    return d.toLocaleString(undefined, {timeZoneName:'short'});
}
function safeTime(iso) {
    const d = safeDate(iso);
    if (!d) return '';
    return d.toLocaleTimeString();
}

        function renderCurrentView() {
            if (state.currentView === 'projects') renderProjects();
            else if (state.currentView === 'team-detail') renderTeamDetail();
            else if (state.currentView === 'live') renderGlobalMissionControl();

        // ==================== MISSION CONTROL ====================

        function renderGlobalMissionControl() {
            const container = document.getElementById('view-live');
            if (!container) return;

            updateMissionsData();
            const missions = Object.values(state.missionsData)
                .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            if (missions.length === 0) {
                container.innerHTML = '<div class="mc-empty">Nenhuma missão encontrada.<br>Execute uma missão para vê-la aqui em tempo real.</div>';
                return;
            }

            const totalMissions = missions.length;
            const runningCount = missions.filter(m => m.status === 'running').length;
            const doneCount = missions.filter(m => m.status === 'completed').length;
            const failedCount = missions.filter(m => m.status === 'failed').length;
            const blockedCount = missions.filter(m => m.status === 'blocked').length;

            // Group by project
            const projectMap = {};
            missions.forEach(m => {
                const pid = m.projectId || 'unknown';
                const pName = state.projects?.find(p => p.id === pid)?.name || pid;
                if (!projectMap[pid]) projectMap[pid] = { name: pName, missions: [] };
                projectMap[pid].missions.push(m);
            });

            let groupsHtml = Object.entries(projectMap).map(([pid, group]) => `
                <div style="margin-bottom:28px;">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">

                            📁 ${escapeHtml(group.name)}
                        </h3>
                        <span class="mc-count">${group.missions.length} missões</span>
                    </div>
                    ${group.missions.map(m => renderMissionCardV2(m)).join('')}
                </div>
            `).join('');

            container.innerHTML = `
                <div class="mc-header-bar">
                    <h2>🚀 Mission Control Global</h2>
                    <div style="display:flex;gap:8px;align-items:center;">
                        ${runningCount > 0 ? `<span class="mc-status-badge running">${runningCount} em execução</span>` : ''}
                        ${blockedCount > 0 ? `<span class="mc-status-badge blocked" title="Missões com tasks paradas por inatividade">⛔ ${blockedCount} blocked</span>` : ''}
                        <span class="mc-count">${totalMissions} missões</span>
                    </div>
                </div>
                <div style="display:flex;gap:8px;margin-bottom:20px;font-size:0.8rem;color:var(--text-muted);">

        function renderProjectMissionControl(projectId) {
            updateMissionsData();
            const missions = Object.values(state.missionsData)
                .filter(m => m.projectId === projectId || m.projectId === 'unknown')
                .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            return `

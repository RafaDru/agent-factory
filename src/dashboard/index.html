<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Factory Platform — Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        /* Variáveis globais (independem do tema) */
        :root {
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --radius-full: 9999px;
            --transition-smooth: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ========== TEMA DARK (padrão) ========== */
        :root[data-theme="dark"] {
            --bg: #0a0a0f;
            --bg-card: rgba(16, 16, 26, 0.7);
            --bg-card-hover: rgba(22, 22, 36, 0.8);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.06);
            --border-neon-cyan: rgba(34, 211, 238, 0.3);
            --border-neon-purple: rgba(168, 85, 247, 0.3);
            --cyan: #22d3ee;
            --cyan-glow: rgba(34, 211, 238, 0.5);
            --purple: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.5);
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --orange: #f97316;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --cyan-rgb: 34, 211, 238;
            --purple-rgb: 168, 85, 247;
            --text-primary-rgb: 241, 245, 249;
            --grid-line: rgba(255, 255, 255, 0.015);
            --card-shadow: none;
            --card-hover-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }

        /* ========== TEMA LIGHT ========== */
        :root[data-theme="light"] {
            --bg: #f8f9fa;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f3f5;
            --bg-glass: rgba(0, 0, 0, 0.02);
            --border-glass: rgba(0, 0, 0, 0.08);
            --border-neon-cyan: rgba(8, 145, 178, 0.2);
            --border-neon-purple: rgba(124, 58, 237, 0.2);
            --cyan: #0891b2;
            --cyan-glow: rgba(8, 145, 178, 0.25);
            --purple: #7c3aed;
            --purple-glow: rgba(124, 58, 237, 0.25);
            --green: #16a34a;
            --yellow: #ca8a04;
            --red: #dc2626;
            --orange: #ea580c;
            --text-primary: #1a1a2e;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --cyan-rgb: 8, 145, 178;
            --purple-rgb: 124, 58, 237;
            --text-primary-rgb: 26, 26, 46;
            --grid-line: rgba(0, 0, 0, 0.05);
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --card-hover-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: var(--font-family);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 10%, rgba(var(--cyan-rgb), 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 60%, rgba(var(--purple-rgb), 0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 90%, rgba(var(--cyan-rgb), 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        #app {
            position: relative;
            z-index: 1;
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px 32px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 28px;
            margin-bottom: 32px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            position: sticky;
            top: 24px;
            z-index: 100;
            transition: var(--transition-smooth);
        }

        .header:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: var(--card-hover-shadow);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.25), 0 0 60px rgba(168, 85, 247, 0.15);
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--transition-smooth);
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border-neon-cyan);
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        .btn-back {
            display: none;
        }

        .breadcrumb {
            margin-bottom: 24px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb span {
            cursor: pointer;
            transition: color 0.2s;
        }

        .breadcrumb span:hover {
            color: var(--cyan);
        }

        .breadcrumb .separator {
            color: var(--text-muted);
            cursor: default;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .project-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 28px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
            opacity: 0;
            transition: opacity 0.35s;
        }

        .project-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.15), 0 0 60px rgba(168, 85, 247, 0.1);
            border-color: var(--border-neon-cyan);
            background: var(--bg-card-hover);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-name {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--text-primary), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .project-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 500;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--cyan);
        }

        .stat-value.purple {
            color: var(--purple);
        }

        .active-agents {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

                .last-execution-section {
            margin-top: 32px;
            margin-bottom: 24px;
            padding: 24px;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
        }

        .last-execution-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .execution-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .execution-card:hover {
            border-color: var(--border-neon-cyan);
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        .execution-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .execution-project {
            font-weight: 600;
            color: var(--text-primary);
        }

        .execution-details {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .execution-status {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: var(--radius-full);
        }

        .execution-status.success {
            background: rgba(34, 197, 94, 0.2);
            color: var(--green);
        }

        .execution-status.failed {
            background: rgba(239, 68, 68, 0.2);
            color: var(--red);
        }

        .execution-status.running {
            background: rgba(234, 179, 8, 0.2);
            color: var(--yellow);
        }

        .no-execution {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
        }

.pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 16px;
        }

        .agent-card {
            background: var(--bg-card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: var(--radius-md);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 10px;
            position: relative;
            transition: var(--transition-smooth);
            overflow: hidden;
        }

        .agent-card.running {
            border-color: var(--green);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.1);
            animation: pulse-border 1.5s infinite;
        }

        .agent-card.failed {
            border-color: var(--red);
        }

        .agent-card.stopped {
            border-color: var(--yellow);
        }

        .agent-card.ready {
            border-color: var(--cyan);
        }

        .agent-card-header {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 16px;
        }

        .agent-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .agent-card.running .agent-avatar {
            border-color: var(--green);
            animation: avatarPulse 2s infinite;
        }

        @keyframes avatarPulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0.1); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        @keyframes flash-green {
            0% { background-color: rgba(34, 197, 94, 0.3); }
            100% { background-color: transparent; }
        }

        .agent-card.flash-success {
            animation: flash-green 0.5s ease-out;
        }

        .agent-card.running .task-name {
            color: var(--green);
            font-weight: 700;
            text-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        }

        .agent-info {
            flex: 1;
        }

        .agent-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .agent-role {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .agent-status {
            display: inline-block;
            padding: 2px 6px;
            border-radius: var(--radius-full);
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        .dot-success { background: var(--green); }
        .dot-running { background: var(--yellow); }
        .dot-failed { background: var(--red); }
        .dot-idle { background: var(--text-muted); }

        .agent-card.success {
            border-color: var(--green);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.1);
        }

        .status-running {
            background: rgba(234, 179, 8, 0.2);
            color: var(--yellow);
            border: 1px solid var(--yellow);
            animation: pulse 2s infinite;
        }

        .status-success {
            background: rgba(34, 197, 94, 0.2);
            color: var(--green);
            border: 1px solid var(--green);
        }

        .status-failed {
            background: rgba(239, 68, 68, 0.2);
            color: var(--red);
            border: 1px solid var(--red);
        }

        .status-idle {
            background: rgba(100, 116, 139, 0.2);
            color: var(--text-muted);
            border: 1px solid var(--text-muted);
        }

        .last-task-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: var(--radius-xs);
            opacity: 0.8;
            display: inline-block;
            margin-top: 4px;
        }
        .last-task-badge.status-success {
            background: rgba(34, 197, 94, 0.2);
            color: var(--green);
            border: 1px solid var(--green);
        }
        .last-task-badge.status-failed {
            background: rgba(239, 68, 68, 0.2);
            color: var(--red);
            border: 1px solid var(--red);
        }
        .last-task-badge.status-idle {
            background: rgba(100, 116, 139, 0.2);
            color: var(--text-muted);
            border: 1px solid var(--text-muted);
        }

        .sub-status {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sub-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--cyan);
        }

        .task-center {
            text-align: center;
            margin: 16px 0;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-sm);
        }

        .task-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .mission-name {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .llm-mode {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin: 12px 0;
        }

        .llm-select {
            background: var(--bg-glass);
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xs);
            padding: 4px 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            flex: 1;
            margin-left: 8px;
        }
        .llm-select:hover {
            border-color: var(--border-neon-cyan);
        }
        .llm-select:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 0 2px var(--cyan-glow);
        }

        .llm-badge {
            background: rgba(34, 211, 238, 0.15);
            color: var(--cyan);
            padding: 2px 8px;
            border-radius: var(--radius-xs);
            font-weight: 600;
        }

        .context-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .context-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease, background 0.5s;
        }

        .context-low { background: var(--green); }
        .context-medium { background: var(--yellow); }
        .context-high { background: var(--red); }

        .context-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: right;
        }

        .last-execution {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-glass);
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .last-execution span {
            white-space: nowrap;
        }

        .last-model {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .last-model span {
            color: var(--cyan);
            font-weight: 500;
        }

        .timer {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--cyan);
            margin-top: 8px;
            font-variant-numeric: tabular-nums;
        }

        .timeline-panel {
            background: var(--bg-card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 20px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .timeline-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timeline-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-xs);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: var(--transition-smooth);
            color: var(--text-secondary);
        }

        .tab-btn.active {
            background: rgba(34, 211, 238, 0.2);
            color: var(--cyan);
        }

        .timeline-items {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
        }

        .timeline-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 16px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
        }

        .timeline-item.coordinator {
            justify-content: flex-start;
        }

        .timeline-item.agent {
            justify-content: flex-end;
        }

        .timeline-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: var(--transition-smooth);
        }

        .timeline-item.coordinator .timeline-bubble {
            border-top-left-radius: 4px;
            border-left: 2px solid var(--cyan);
        }

        .timeline-item.agent .timeline-bubble {
            border-top-right-radius: 4px;
            border-right: 2px solid var(--purple);
        }

        .timeline-bubble:hover {
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.15);
            border-color: var(--border-neon-cyan);
        }

        .timeline-actor {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .coordinator-actor { color: var(--cyan); }
        .agent-actor { color: var(--purple); }

        .timeline-message {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .timeline-details {
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: none;
        }

        .timeline-item.expanded .timeline-details {

        .timeline-details pre {
            background: rgba(0, 0, 0, 0.3);

        .connector {

            position: relative;
        }

        .connector.coordinator { background: var(--cyan); }
        .connector.agent { background: var(--purple); }

        .connector-arrow::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 6px solid var(--cyan);
        }
        .connector-arrow.coordinator::after { border-top-color: var(--cyan); }

        .loading, .error, .empty-state {

        @media (max-width: 768px) {

<body>
    <div id="app">
        <header class="header">
            <div class="header-left">
                <div class="logo-icon">AF</div>
                <span class="logo-text">Agent Factory</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-back" id="btnBack" onclick="navigateBack()" title="Back">
                    ← Back
                </button>
                <button class="btn" id="btnRefresh" onclick="refreshData()" title="Refresh">
                    ↻
                </button>
                <button class="btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>

                <button class="btn" id="logs-toggle" title="Logs">Logs</button>
            </div>
        </header>

        <!-- Breadcrumb -->
        <div class="breadcrumb" id="breadcrumb"></div>

        <!-- Views -->
        <div id="view-projects" class="view active"></div>
        <div id="view-team-detail" class="view"></div>
    </div>

    <script>

        const L = {
            back: 'Back',
            refresh: 'Refresh',
            logs: 'Logs',
            agents: 'AGENTS',
            active: 'ACTIVE',
            agent: 'Agent',
            idle: 'IDLE',
            success: 'SUCCESS',
            failed: 'FAILED',
            running: 'RUNNING',
            noActiveTask: 'No active task',
            llm: 'LLM:',
            interactionFlow: 'Interaction Flow',
            noInteractions: 'No interactions yet',
            timeline: 'Timeline',
            eventLogs: 'Event Logs',
            allAgents: 'All Agents',
            allTypes: 'All Types',
            close: 'Close',
            clear: 'Clear',
            projects: 'Projects',
            lastExecution: 'Last Execution',
            noRecentExecutions: 'No recent executions',
            noExecutionsYet: 'No executions yet',
            last: 'Last:',
            filteredBy: 'Filtered by:',
            noAgents: 'No agents',
            agentsRunning: 'agents running',
            executing: 'Executing...',
            mission: 'Mission:',
            uncategorized: 'Uncategorized',
        };
        // ==================== STATE MANAGEMENT ====================
        const state = {
            projects: [],
            missions: [],
            agentsState: {}, // agentId -> { status, subStatus, task, mission, timer, context, lastExecution, events }
            currentView: 'projects',
            currentProjectId: null,
            navigationStack: [],
            sseConnection: null,
            connectionStatus: 'connecting',
            eventTimers: {} // agentId -> intervalId
        };

        // ==================== API ====================
        const API = {
            async fetchProjects() {
                const res = await fetch('/api/projects');
                if (!res.ok) throw new Error('Failed to fetch projects');
                return res.json();
            },
            async fetchMissions() {
                const res = await fetch('/api/missions');
                if (!res.ok) throw new Error('Failed to fetch missions');
                return res.json();
            },
            async fetchContext(projectId) {
                const res = await fetch('/api/context?project=' + encodeURIComponent(projectId));
                if (!res.ok) throw new Error('Failed to fetch context');
                return res.json();
            },
            connectSSE() {
                if (state.sseConnection) {
                    state.sseConnection.close();
                }
                state.connectionStatus = 'connecting';
                const es = new EventSource('/api/events/stream');
                es.onopen = () => {
                    state.connectionStatus = 'connected';
                    console.log('SSE connected');
                };
                es.onerror = () => {
                    state.connectionStatus = 'error';
                    console.warn('SSE connection error, reconnecting...');
                    setTimeout(() => API.connectSSE(), 5000);
                };
                es.addEventListener('agent_event', (e) => {
                    try {
                        const event = JSON.parse(e.data);
                        handleAgentEvent(event);
                    } catch (err) {
                        console.error('Error parsing SSE event:', err);
                    }
                });
                state.sseConnection = es;
            }
        };

        // ==================== EVENT HANDLING ====================
        function handleAgentEvent(event) {
            const agentId = event.agent_id;
            if (!agentId) return;

            if (!state.agentsState[agentId]) {
                state.agentsState[agentId] = {
                    status: 'ready',
                    subStatus: '',
                    task: null,
                    mission: null,
                    timer: 0,
                    timerStart: null,
                    context: 0,
                    lastExecution: null,
                    lastTaskStatus: null,
                    events: []
                };
            }

            const agentState = state.agentsState[agentId];

            if (event.status) {
                agentState.status = event.status.toLowerCase();
                if (agentState.status === 'running' && !agentState.timerStart) {
                    agentState.timerStart = Date.now();
                    if (state.eventTimers[agentId]) clearInterval(state.eventTimers[agentId]);
                    state.eventTimers[agentId] = setInterval(() => updateTimer(agentId), 1000);
                } else if (agentState.status !== 'running') {
                    if (state.eventTimers[agentId]) {
                        clearInterval(state.eventTimers[agentId]);
                        delete state.eventTimers[agentId];
                    }
                    agentState.timerStart = null;
                    agentState.timer = 0;
                }
                // Flash success on completion
                if (agentState.status === 'completed' || agentState.status === 'success') {
                    agentState.flashSuccess = true;
                } else {
                    agentState.flashSuccess = false;
                }

                if (agentState.status === 'completed' || agentState.status === 'success') {
                    agentState.lastTaskStatus = 'success';
                } else if (agentState.status === 'failed') {
                    agentState.lastTaskStatus = 'failed';
                }
            }

            if (event.sub_status || event.message) {
                agentState.subStatus = event.sub_status || event.message.toLowerCase();
            }

            if (event.task_id) agentState.task = event.task_id;
            if (event.mission_id) agentState.mission = event.mission_id;
            else if (event.payload && event.payload.mission) agentState.mission = event.payload.mission;

            if (event.metrics) {
                if (event.metrics.context !== undefined) {
                    agentState.context = event.metrics.context;
                }
            }

            const model = event.metrics?.model 
                || (event.metrics?.provider ? `${event.metrics.provider}/${event.metrics.model || ''}` : null)
                || (event.payload?.model)
                || (agentState.llmConfig?.provider)
                || null;
            agentState.llmConfig = { provider: event.metrics?.provider || null };
            agentState.lastExecution = {
                timestamp: event.timestamp || new Date().toISOString(),
                mission: agentState.mission,
                task: agentState.task,
                status: agentState.status,
                duration: event.metrics?.duration_ms || 0,
                model: model
            };

            agentState.events.unshift({
                id: Date.now(),
                type: event.agent_id.includes('coordinator') ? 'coordinator' : 'agent',
                actor: event.agent_id,
                message: event.message || event.status,
                payload: event.payload,
                timestamp: event.timestamp || new Date().toISOString()
            });

            if (agentState.events.length > 100) agentState.events.pop();

            if (state.currentView === 'team-detail') {
                const card = document.getElementById('agent-' + agentId);
                if (card) {
                    updateAgentCardUI(agentId);
                } else {
                    renderTeamDetail();
                }
            }

            // Add to logs panel
            if (typeof addLogEntry === 'function') {
                addLogEntry(event);
            }
        }

        function updateTimer(agentId) {
            const agentState = state.agentsState[agentId];
            if (agentState && agentState.timerStart && agentState.status === 'running') {
                const elapsed = Math.floor((Date.now() - agentState.timerStart) / 1000);
                agentState.timer = elapsed;
                const timerEl = document.getElementById(`timer-${agentId}`);
                if (timerEl) {
                    timerEl.textContent = formatTime(elapsed);
                }
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateAgentCardUI(agentId) {
            const card = document.getElementById('agent-' + agentId);
            if (!card) return;
            const aState = state.agentsState[agentId];
            if (!aState) return;

            const info = getStatusInfo(aState.status);
            card.className = 'agent-card ' + info.cardClass;

            const statusEl = card.querySelector('.agent-status');
            if (statusEl) {
                statusEl.className = 'agent-status ' + info.statusClass;
                statusEl.innerHTML = '<span class="status-dot ' + info.dotClass + '"></span>' + info.label;
            }

            const taskEl = card.querySelector('.task-name');
            if (taskEl) taskEl.textContent = aState.task || L.noActiveTask;

            const missionEl = card.querySelector('.mission-name');
            if (missionEl) missionEl.textContent = aState.mission || '';

            const timerEl = card.querySelector('.timer');
            if (aState.status === 'running') {
                if (timerEl) {
                    timerEl.textContent = formatTime(aState.timer || 0);
                }
            } else if (timerEl) {
                timerEl.remove();
            }

            const lastBadge = card.querySelector('.last-task-badge');
            if (lastBadge) {
                const lastStatus = aState.lastTaskStatus || 'idle';
                const lastInfo = getStatusInfo(lastStatus);
                lastBadge.className = 'last-task-badge ' + lastInfo.statusClass;
                lastBadge.textContent = 'Last: ' + (lastStatus === 'idle' ? '-' : lastInfo.label);
            }

            const modelSpan = card.querySelector('.last-model span');
            if (modelSpan && aState.lastExecution?.model) {
                modelSpan.textContent = aState.lastExecution.model;
            }
        }

        // ==================== NAVIGATION ====================
        async function navigateTo(view, params = {}) {
            state.navigationStack.push({
                view: state.currentView,
                params: { projectId: state.currentProjectId }
            });
            switchView(view, params);
        }

        function navigateBack() {
            if (state.navigationStack.length === 0) return;
            const prev = state.navigationStack.pop();
            switchView(prev.view, prev.params);
        }

        async function switchView(view, params = {}) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            const viewEl = document.getElementById(`view-${view}`);
            if (viewEl) viewEl.classList.add('active');

            state.currentView = view;
            state.currentProjectId = params.projectId || null;

            updateBreadcrumb();
            updateBackButton();
            // Carregar eventos históricos para o Interaction Flow
        try {
            const eventsRes = await fetch('/api/events');
            if (eventsRes.ok) {
                const eventsData = await eventsRes.json();
                const events = Array.isArray(eventsData) ? eventsData : (eventsData.events || []);
                events.forEach(event => {
                    const agentId = event.agent_id;
                    if (agentId && !state.agentsState[agentId]) {
                        state.agentsState[agentId] = { status:'ready', subStatus:'idle', task:null, mission:null, timer:0, timerStart:null, context:0, lastExecution:null, events: [] };
                    }
                    if (agentId && state.agentsState[agentId]) {
                        const agentState = state.agentsState[agentId];
                        agentState.events.unshift({
                            id: Date.now() + Math.random(),
                            type: agentId.includes('coordinator') ? 'coordinator' : 'agent',
                            actor: agentId,
                            message: event.message || event.status || 'Event',
                            payload: event.payload,
                            timestamp: event.timestamp || new Date().toISOString()
                        });
                        if (agentState.events.length > 100) agentState.events.pop();
                    }
                });
            }
        } catch (err) {
            console.error('Error loading historical events:', err);
        }
        renderCurrentView();
        }

        function updateBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            bc.innerHTML = '';
            const items = [{ label: 'Projects', action: () => switchView('projects') }];

            if (state.currentProjectId) {
                const project = state.projects.find(p => p.id === state.currentProjectId);
                items.push({
                    label: project?.name || state.currentProjectId,
                    action: () => {}
                });
            }

            items.forEach((item, idx) => {
                if (idx > 0) {
                    const sep = document.createElement('span');
                    sep.className = 'separator';
                    sep.textContent = '/';
                    bc.appendChild(sep);
                }
                const span = document.createElement('span');
                span.textContent = item.label;
                span.addEventListener('click', item.action);
                bc.appendChild(span);
            });
        }

        function updateBackButton() {
            const btnBack = document.getElementById('btnBack');
            btnBack.style.display = state.currentView === 'projects' ? 'none' : 'flex';
        }

        // ==================== RENDER FUNCTIONS ====================
        function renderCurrentView() {
            if (state.currentView === 'projects') renderProjects();
            else if (state.currentView === 'team-detail') renderTeamDetail();
        }

        function renderProjects() {
            const container = document.getElementById('view-projects');
            if (!state.projects || state.projects.length === 0) {
                container.innerHTML = '<div class="empty-state">No projects found</div>';
                return;
            }

            let html = '<div class="projects-grid">';
            state.projects.forEach(project => {
                const agentsCount = project.agents?.length || 0;
                let activeCount = 0;
                project.agents?.forEach(agent => {
                    const aState = state.agentsState[agent.id];
                    if (aState && aState.status === 'running') activeCount++;
                });

                html += `
                <div class="project-card" onclick="navigateTo('team-detail', { projectId: '${project.id}' })">
                    <div class="project-name">${project.name}</div>
                    <div class="project-stats">
                        <div class="stat-item">
                            <span class="stat-label">${L.agents}</span>
                            <span class="stat-value purple">${agentsCount}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">${L.active}</span>
                            <span class="stat-value purple">${activeCount}</span>
                        </div>
                    </div>
                    <div class="active-agents">
                        <span class="pulse-dot"></span>
                        ${activeCount} agent${activeCount !== 1 ? 's' : ''} running
                    </div>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderLastExecution(projectId) {
            if (!state.missions || state.missions.length === 0) {
                return '<div class="last-execution-section"><div class="last-execution-title">${L.lastExecution}</div><div class="no-execution">${L.noRecentExecutions}</div></div>';
            }

            // Filtrar missoes do projeto (se especificado)
            let missions = state.missions;
            if (projectId) {
                missions = missions.filter(m => m.project_id === projectId || (m.objective || '').includes(projectId));
            }
            if (missions.length === 0) {
                return '';
            }

            // Ordena missões por timestamp decrescente (mais recente primeiro)
            const sortedMissions = [...missions].sort((a, b) => {
                const timeA = new Date(a.timestamp || a.created_at || 0).getTime();
                const timeB = new Date(b.timestamp || b.created_at || 0).getTime();
                return timeB - timeA;
            });

            const lastMission = sortedMissions[0];
            if (!lastMission) {
                return '<div class="last-execution-section"><div class="last-execution-title">${L.lastExecution}</div><div class="no-execution">${L.noRecentExecutions}</div></div>';
            }

            const missionProjectId = lastMission.project_id || projectId || 'unknown';
            const project = state.projects.find(p => p.id === missionProjectId);
            const projectName = project ? project.name : missionProjectId;
            const agentsCount = project ? (project.agents?.length || 0) : '?';
            const status = lastMission.status || 'unknown';
            const timestamp = lastMission.timestamp || lastMission.created_at;
            const formattedTime = timestamp ? new Date(timestamp).toLocaleString() : 'N/A';

            let statusClass = '';
            if (status === 'completed' || status === 'success') statusClass = 'success';
            else if (status === 'failed') statusClass = 'failed';
            else if (status === 'running') statusClass = 'running';

            return `
                <div class="last-execution-section">
                    <div class="last-execution-title">${L.lastExecution}</div>
                    <div class="execution-card" onclick="navigateTo('team-detail', { projectId: '${missionProjectId}' })">
                        <div class="execution-info">
                            <span class="execution-project">${projectName}</span>
                            <span class="execution-details">${agentsCount} ${L.agents} • ${formattedTime}</span>
                        </div>
                        <span class="execution-status ${statusClass}">${status.toUpperCase()}</span>
                    </div>
                </div>
            `;
        }


        function renderTeamDetail() {
            const container = document.getElementById('view-team-detail');
            const project = state.projects.find(p => p.id === state.currentProjectId);
            if (!project) {
                container.innerHTML = '<div class="error">Project not found</div>';
                return;
            }

            let agentsHtml = '';
            if (!project.agents || project.agents.length === 0) {
                agentsHtml = `<div class="empty-state">${L.noAgents}</div>`;
            } else {
                agentsHtml = '<div class="agents-grid">';
                project.agents.forEach(agent => {
                    const agentState = state.agentsState[agent.id] || {
                        status: 'ready',
                        subStatus: 'idle',
                        task: null,
                        mission: null,
                        timer: 0,
                        timerStart: null,
                        context: 0,
                        lastExecution: null,
                        events: []
                    };
                    const statusInfo = getStatusInfo(agentState.status);

                    const lastTaskStatus = agentState.lastTaskStatus || 'idle';
                    const lastStatusInfo = getStatusInfo(lastTaskStatus);
                    const lastLabel = lastTaskStatus === 'idle' ? '-' : lastStatusInfo.label;
                    const contextPct = agentState.context || 0;
                    let contextClass = 'context-low';
                    if (contextPct >= 80) contextClass = 'context-high';
                    else if (contextPct >= 50) contextClass = 'context-medium';

                    const emoji = getAgentEmoji(agent.role || agent.id);
                    const timerDisplay = agentState.status === 'running' ? `
                        <div class="timer" id="timer-${agent.id}">${formatTime(agentState.timer || 0)}</div>
                    ` : '';

                    const modelUsed = agentState.lastExecution?.model || null;
                    const lastExecHtml = agentState.lastExecution ? `
                        <div class="last-execution">
                            <span>${new Date(agentState.lastExecution.timestamp).toLocaleString()}</span>
                            <span>• ${agentState.lastExecution.mission || 'N/A'}</span>
                            <span>• ${agentState.lastExecution.task || 'N/A'}</span>
                            <span>• ${agentState.lastExecution.status}</span>
                            <span>• ${formatDuration(agentState.lastExecution.duration)}</span>
                        </div>
                    ` : '';

                    agentsHtml += `
                    <div class="agent-card ${statusInfo.cardClass}" id="agent-${agent.id}" data-agent-id="${agent.id}" data-flash-success="${agentState.flashSuccess ? 'true' : 'false'}">
                        <div class="agent-card-header">
                            <div class="agent-avatar">${emoji}</div>
                            <div class="agent-info">
                                <div class="agent-name">${agent.name || agent.id}</div>
                                <div class="agent-role">${agent.role || 'Agent'}</div>
                                <div class="agent-status ${statusInfo.statusClass}">
                                    <span class="status-dot ${statusInfo.dotClass}"></span>${statusInfo.label}
                                </div>
                                <div class="last-task-badge ${lastStatusInfo.statusClass}">${L.last} ${lastLabel}</div>
                                ${(agentState.status === 'running' || agentState.status === 'completed' || agentState.status === 'success' || agentState.status === 'failed') ? `<div class="sub-status">${agentState.task || agentState.subStatus || L.executing}</div>` : ''}
                            </div>
                        </div>
                        <div class="task-center">
                            <div class="task-name">${agentState.task || L.noActiveTask}</div>
                            <div class="mission-name">${agentState.mission || ''}</div>
                        </div>
                        ${timerDisplay}
                        <div class="llm-mode">
                            <label for="llm-select-${agent.id}" style="font-size:0.8rem; color: var(--text-secondary);">${L.llm}</label>
                            <select id="llm-select-${agent.id}" class="llm-select" onchange="updateAgentConfig('${agent.id}', this.value)">
                                <option value="AUTO" ${(agent.llm_mode || 'AUTO') === 'AUTO' ? 'selected' : ''}>AUTO</option>
                                <option value="opencode_zen" ${(agent.llm_mode || 'AUTO') === 'opencode_zen' ? 'selected' : ''}>opencode_zen (deepseek-v4-pro)</option>
                                <option value="groq" ${(agent.llm_mode || 'AUTO') === 'groq' ? 'selected' : ''}>groq (llama-3.3-70b)</option>
                                <option value="opencode" ${(agent.llm_mode || 'AUTO') === 'opencode' ? 'selected' : ''}>opencode (deepseek-v4-pro)</option>
                            </select>
                        </div>
                        <div class="last-model">${L.last} <span>${modelUsed || L.noExecutionsYet}</span></div>
                        <div class="context-bar">
                            <div class="context-fill ${contextClass}" style="width: ${Math.min(contextPct, 100)}%"></div>
                        </div>
                        <div class="context-text">Context: ${contextPct}%</div>
                        ${lastExecHtml}
                    </div>`;
                });
                agentsHtml += '</div>';
            }

            const timelineHtml = renderTimeline(project.agents);

            container.innerHTML = `
                <div class="team-detail-layout">
                    <div>
                        <h2 style="margin-bottom: 20px;">${project.name} — ${L.agents}</h2>
                        ${renderLastExecution(project.id)}
                        ${agentsHtml}
                    </div>
                    <div class="timeline-panel" id="interaction-flow">
                        ${timelineHtml}
                    </div>
                </div>
            `;

            // Restart timers for running agents

            // Flash success animation for agents that just completed
            document.querySelectorAll('.agent-card[data-flash-success="true"]').forEach(card => {
                card.classList.add('flash-success');
                const agentId = card.dataset.agentId;
                if (state.agentsState[agentId]) {
                    state.agentsState[agentId].flashSuccess = false;
                }
                setTimeout(() => {
                    card.classList.remove('flash-success');
                }, 1500);
            });
            project.agents.forEach(agent => {
                const aState = state.agentsState[agent.id];
                if (aState && aState.status === 'running' && !state.eventTimers[agent.id]) {
                    aState.timerStart = Date.now() - (aState.timer || 0) * 1000;
                    state.eventTimers[agent.id] = setInterval(() => updateTimer(agent.id), 1000);
                }
            });

            // Fetch and set LLM config for each agent
            project.agents.forEach(agent => {
                fetch(`/api/agent-config?agent_id=${encodeURIComponent(agent.id)}`)
                    .then(response => response.json())
                    .then(data => {
                        const selectEl = document.getElementById(`llm-select-${agent.id}`);
                        if (selectEl && data.llm_provider) {
                            selectEl.value = data.llm_provider;
                        }
                    })
                    .catch(err => console.error('Error fetching agent config:', err));
            });

            // Fetch context for project
            API.fetchContext(project.id).then(data => {
                if (data && data.agents) {
                    Object.entries(data.agents).forEach(([agentId, agentContext]) => {
                        const contextPct = agentContext.context_pct || 0;
                        const sizeBytes = agentContext.context_size_bytes || 0;
                        if (state.agentsState[agentId]) {
                            state.agentsState[agentId].context = contextPct;
                        }
                        updateAgentContext(agentId, contextPct, sizeBytes);
                    });
                }
            }).catch(err => console.error('Error fetching context:', err));
        }

        function renderTimeline(agents) {
            let allEvents = [];
            agents.forEach(agent => {
                const aState = state.agentsState[agent.id];
                if (aState && aState.events) {
                    allEvents = allEvents.concat(aState.events.map(e => ({ ...e, agentId: agent.id })));
                }
            });
            allEvents.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            allEvents = allEvents.slice(0, 50);

            if (allEvents.length === 0) {
                return `
                    <div class="timeline-header">Interaction Flow</div>
                    <div class="empty-state">${L.noInteractions}</div>
                `;
            }

            // Group events by task_id or trace_id
            const groups = {};
            allEvents.forEach(event => {
                const key = event.task_id || event.trace_id || L.uncategorized;
                if (!groups[key]) {
                    groups[key] = [];
                }
                groups[key].push(event);
            });

            // Sort groups by the timestamp of the first event (most recent first)
            const sortedGroups = Object.entries(groups).sort((a, b) => {
                const aTime = new Date(a[1][0].timestamp).getTime();
                const bTime = new Date(b[1][0].timestamp).getTime();
                return bTime - aTime;
            });

            let html = `
                <div class="timeline-header">
                    <span>${L.interactionFlow}</span>
                    <div class="timeline-tabs">
                        <button class="tab-btn active">${L.timeline}</button>
                        <button class="tab-btn">${L.logs}</button>
                    </div>
                </div>
                <div class="timeline-items">
            `;

            sortedGroups.forEach(([groupKey, events]) => {
                // Sort events within group by timestamp ascending (oldest first) for logical flow
                events.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

                const firstEvent = events[0];
                const lastEvent = events[events.length - 1];
                const startTime = new Date(firstEvent.timestamp).toLocaleString();
                const endTime = new Date(lastEvent.timestamp).toLocaleString();
                const status = lastEvent.status || 'unknown';

                html += `
                <div class="mission-card">
                    <div class="mission-header">
                        <span class="mission-title">Mission: ${groupKey}</span>
                        <span class="mission-status">${status}</span>
                        <span class="mission-time">${startTime} — ${endTime}</span>
                    </div>
                    <div class="mission-steps">
                `;

                events.forEach((event, idx) => {
                    const emoji = getAgentEmoji(event.agentId);
                    const agentId = event.agentId || event.actor;
                    const message = event.message || 'Event';
                    const timestamp = new Date(event.timestamp).toLocaleTimeString();
                    const isCoordinator = agentId.toLowerCase().includes('coordinator');
                    const alignClass = isCoordinator ? 'chat-left' : 'chat-right';

                    html += `
                        <div class="mission-step ${alignClass}">
                            <div class="chat-avatar">${emoji}</div>
                            <div class="chat-bubble">
                                <div class="chat-message">${message}</div>
                                <div class="chat-timestamp">${timestamp}</div>
                            </div>
                        </div>
                    `;
                });

                html += `
                    </div>
                </div>`;
            });

            html += '</div>';
            return html;
        }

        function toggleTimelineDetails(element) {
            element.classList.toggle('expanded');
        }

        function getAgentEmoji(role) {
            const emojis = {
                'coordinator': '🎯',
                'dev': '💻',
                'qa': '🧪',
                'designer': '🎨',
                'planner': '📋',
                'default': '🤖'
            };
            const key = (role || '').toLowerCase();
            return emojis[key] || emojis.default;
        }

        function formatDuration(ms) {
            if (!ms) return '0ms';
            if (ms < 1000) return `${ms}ms`;
            const secs = Math.floor(ms / 1000);
            if (secs < 60) return `${secs}s`;
            const mins = Math.floor(secs / 60);
            const remainingSecs = secs % 60;
            return `${mins}m ${remainingSecs}s`;
        }

        function getStatusInfo(status) {
            const s = (status || 'idle').toLowerCase();
            let statusClass, dotClass, label, cardClass;
            if (s === 'running') {
                statusClass = 'status-running';
                dotClass = 'dot-running';
                label = 'RUNNING';
                cardClass = 'running';
            } else if (s === 'completed' || s === 'success') {
                statusClass = 'status-success';
                dotClass = 'dot-success';
                label = 'SUCCESS';
                cardClass = 'success';
            } else if (s === 'failed') {
                statusClass = 'status-failed';
                dotClass = 'dot-failed';
                label = 'FAILED';
                cardClass = 'failed';
            } else {
                statusClass = 'status-idle';
                dotClass = 'dot-idle';
                label = 'IDLE';
                cardClass = 'ready';
            }
            return { statusClass, dotClass, label, cardClass };
        }

        function updateAgentContext(agentId, contextPct, sizeBytes) {
            const card = document.getElementById(`agent-${agentId}`);
            if (!card) return;
            const contextFill = card.querySelector('.context-fill');
            const contextText = card.querySelector('.context-text');
            if (contextFill) {
                const pct = Math.min(Math.max(contextPct || 0, 0), 100);
                contextFill.style.width = pct + '%';
                contextFill.classList.remove('context-low', 'context-medium', 'context-high');
                if (pct >= 80) contextFill.classList.add('context-high');
                else if (pct >= 50) contextFill.classList.add('context-medium');
                else contextFill.classList.add('context-low');
            }
            if (contextText) {
                const kb = sizeBytes ? (sizeBytes / 1024).toFixed(1) : '0.0';
                contextText.textContent = `Context: ${contextPct || 0}% (${kb} KB)`;
            }
        }

        async function updateAgentConfig(agentId, llmProvider) {
            try {
                const response = await fetch('/api/agent-config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: agentId, llm_provider: llmProvider })
                });
                if (!response.ok) {
                    console.error('Failed to update agent config:', response.statusText);
                }
            } catch (error) {
                console.error('Error updating agent config:', error);
            }
        }

        // ==================== INITIALIZATION ====================
        async function loadInitialData() {
            try {
                const [projects, missions] = await Promise.all([
                    API.fetchProjects(),
                    API.fetchMissions()
                ]);

                // -------- Normalização dos dados --------
                state.projects = (projects || []).map(p => ({
                    id: p.project_id,
                    name: p.project_name || p.project_id,
                    icon: p.icon || '📁',
                    agents: (p.agents || []).map(a => ({
                        id: a.agent_id,
                        name: a.agent_name,
                        role: a.role,
                        llm_mode: a.llm_mode,
                        llm_model: a.llm_model,
                        ...a
                    }))
                }));
                // ----------------------------------------

                state.missions = Array.isArray(missions) ? missions : (missions.missions || []);

                // Inicializa estado dos agentes
                state.projects.forEach(project => {
                    project.agents?.forEach(agent => {
                        if (!state.agentsState[agent.id]) {
                            state.agentsState[agent.id] = {
                                status: 'ready',
                                subStatus: 'idle',
                                task: null,
                                mission: null,
                                timer: 0,
                                timerStart: null,
                                context: 0,
                                lastExecution: null,
                                lastTaskStatus: null,
                                events: []
                            };
                        }
                    });
                });

                renderCurrentView();
            } catch (error) {
                console.error('Failed to load initial data:', error);
                document.getElementById('view-projects').innerHTML = '<div class="error">Failed to load projects. Is the server running?</div>';
            }
        }

        async function refreshData() {
            await loadInitialData();
        }

        async function loadPastEvents() {
            try {
                const controller = new AbortController();
                setTimeout(() => controller.abort(), 5000);
                const res = await fetch('/api/events', { signal: controller.signal });
                if (!res.ok) throw new Error('Failed to fetch events');
                const data = await res.json();
                const events = (data.events || data).reverse();
                if (Array.isArray(events)) {
                    events.forEach(event => {
                        if (typeof window.addLogEntry === 'function') {
                            window.addLogEntry(event);
                        }
                    });
                }
            } catch (err) {
                console.warn('Error loading past events:', err);
            }
        }

        // Start application
        document.addEventListener('DOMContentLoaded', () => {
            loadInitialData();
            API.connectSSE();
            loadPastEvents();
        });

        // Expose functions globally
        window.navigateTo = navigateTo;
        window.navigateBack = navigateBack;
        window.refreshData = refreshData;
        window.toggleTimelineDetails = toggleTimelineDetails;

        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const btn = document.getElementById('theme-toggle');
            if (btn) {
                btn.textContent = theme === 'dark' ? '🌙' : '☀️';
            }
        }

        // Initialize theme from localStorage
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
                updateThemeIcon(savedTheme);
            } else {
                // default is dark, icon moon
                updateThemeIcon('dark');
            }
        })();
    </script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    (function() {
        const MAX_ENTRIES = 200;
        const logEntriesContainer = document.getElementById('log-entries');
        const logsPanel = document.getElementById('logs-panel');
        const logsToggle = document.getElementById('logs-toggle');
        const clearBtn = document.getElementById('clear-logs');
        const filterAgent = document.getElementById('log-filter-agent');
        const filterType = document.getElementById('log-filter-type');

        function updateAgentFilterOptions() {
            const agents = new Set();
            if (state.projects) {
                state.projects.forEach(project => {
                    project.agents?.forEach(agent => agents.add(agent.id));
                });
            }
            Object.keys(state.agentsState).forEach(id => agents.add(id));
            while (filterAgent.options.length > 1) {
                filterAgent.remove(1);
            }
            agents.forEach(id => {
                const option = document.createElement('option');
                option.value = id;
                option.textContent = id;
                filterAgent.appendChild(option);
            });
        }

        function formatTimestamp(isoString) {
            if (isoString && !isoString.endsWith('Z') && !isoString.includes('+')) {
                isoString += 'Z';
            }
            const date = new Date(isoString);
            return date.toLocaleString();
        }

        window.addLogEntry = function(event) {
            if (!logEntriesContainer) return;
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.dataset.agentId = event.agent_id || '';
            entry.dataset.status = event.status || '';
            entry.dataset.taskId = event.task_id || '';

            const timestamp = formatTimestamp(event.timestamp || new Date().toISOString());
            const agentId = event.agent_id || 'unknown';
            const status = event.status || 'unknown';
            const taskId = event.task_id || 'N/A';

            entry.innerHTML = `
                <span class="timestamp">${timestamp}</span>
                <span class="agent-id">${agentId}</span>
                <span class="status">${status}</span>
                <span class="task-id">${taskId}</span>
            `;

            logEntriesContainer.insertBefore(entry, logEntriesContainer.firstChild);

            while (logEntriesContainer.children.length > MAX_ENTRIES) {
                logEntriesContainer.removeChild(logEntriesContainer.lastChild);
            }

            applyFilters();
        };

        function applyFilters() {
            const agentFilter = filterAgent.value;
            const typeFilter = filterType.value;

            const entries = logEntriesContainer.querySelectorAll('.log-entry');
            entries.forEach(entry => {
                const agentId = entry.dataset.agentId;
                const status = entry.dataset.status;
                let show = true;
                if (agentFilter !== 'all' && agentId !== agentFilter) {
                    show = false;
                }
                if (typeFilter !== 'all' && status !== typeFilter) {
                    show = false;
                }
                entry.style.display = show ? '' : 'none';
            });
        }

        function clearLogs() {
            if (logEntriesContainer) {
                logEntriesContainer.innerHTML = '';
            }
            filterAgent.value = 'all';
            filterType.value = 'all';
            applyFilters();
        }

        function updateLogFilterInfo(agentId) {
            const infoDiv = document.getElementById('log-filter-info');
            if (!infoDiv) return;
            const agentState = state.agentsState[agentId];
            if (!agentState) {
                infoDiv.style.display = 'none';
                return;
            }
            const lastExec = agentState.lastExecution;
            let modelText = '—';
            if (lastExec && lastExec.model) {
                modelText = lastExec.model;
            }
            infoDiv.innerHTML = `${L.filteredBy} ${agentId} | ${L.last} modelo: ${modelText}`;
            infoDiv.style.display = 'block';
        }


        // Click on agent card opens logs filtered for that agent
        document.addEventListener('click', function(e) {
            const card = e.target.closest('.agent-card');
            if (!card) return;
            const agentId = card.dataset.agentId;
            if (!agentId) return;
            if (logsPanel) {
                logsPanel.style.display = 'block';
            }
            updateAgentFilterOptions();
            if (filterAgent) {
                filterAgent.value = agentId;
            }
            applyFilters();
            updateLogFilterInfo(agentId);
        });

        if (logsToggle && logsPanel) {
            logsToggle.addEventListener('click', () => {
                const isVisible = logsPanel.style.display !== 'none';
                logsPanel.style.display = isVisible ? 'none' : 'block';
                if (!isVisible) {
                    updateAgentFilterOptions();
                }
            });
        }

        if (clearBtn) {
            clearBtn.addEventListener('click', clearLogs);
        }

        if (filterAgent) {
            filterAgent.addEventListener('change', applyFilters);
        }
        if (filterType) {
            filterType.addEventListener('change', applyFilters);
        }

        // Close button for logs panel
        const closeBtn = document.querySelector('.logs-close-btn');
        if (closeBtn && logsPanel) {
            closeBtn.addEventListener('click', () => {
                logsPanel.style.display = 'none';
            });
        }
    })();
});
</script>

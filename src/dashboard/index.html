<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Factory Platform — Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --bg-deep: #0a0a0f;
            --bg-card: rgba(16, 16, 26, 0.7);
            --bg-card-hover: rgba(22, 22, 36, 0.8);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.06);
            --border-neon-cyan: rgba(34, 211, 238, 0.3);
            --border-neon-purple: rgba(168, 85, 247, 0.3);
            --cyan: #22d3ee;
            --cyan-glow: rgba(34, 211, 238, 0.5);
            --purple: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.5);
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --orange: #f97316;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --transition-smooth: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-deep);
            font-family: var(--font-family);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 10%, rgba(34, 211, 238, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 60%, rgba(168, 85, 247, 0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 90%, rgba(34, 211, 238, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        #app {
            position: relative;
            z-index: 1;
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px 32px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 28px;
            margin-bottom: 32px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            position: sticky;
            top: 24px;
            z-index: 100;
            transition: var(--transition-smooth);
        }

        .header:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.25), 0 0 60px rgba(168, 85, 247, 0.15);
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--transition-smooth);
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border-neon-cyan);
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        .btn-back {
            display: none;
        }

        /* Breadcrumb */
        .breadcrumb {
            margin-bottom: 24px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb span {
            cursor: pointer;
            transition: color 0.2s;
        }

        .breadcrumb span:hover {
            color: var(--cyan);
        }

        .breadcrumb .separator {
            color: var(--text-muted);
            cursor: default;
        }

        /* Views */
        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        /* Project Cards Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .project-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 28px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
            opacity: 0;
            transition: opacity 0.35s;
        }

        .project-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.15), 0 0 60px rgba(168, 85, 247, 0.1);
            border-color: var(--border-neon-cyan);
            background: var(--bg-card-hover);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-name {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--text-primary), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .project-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 500;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--cyan);
        }

        .stat-value.purple {
            color: var(--purple);
        }

        .active-agents {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* Teams Grid */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .team-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 24px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .team-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-neon-purple);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.15);
            background: var(--bg-card-hover);
        }

        .team-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .team-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .team-meta span {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: var(--radius-xs);
        }

        /* Team Detail View */
        .team-detail-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .team-detail-layout {
                grid-template-columns: 1fr;
            }
        }

        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Agent Card */
        .agent-card {
            background: var(--bg-card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 20px;
            position: relative;
            transition: var(--transition-smooth);
            overflow: hidden;
        }

        .agent-card.running {
            border-color: var(--green);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.1);
        }

        .agent-card.failed {
            border-color: var(--red);
        }

        .agent-card.stopped {
            border-color: var(--yellow);
        }

        .agent-card.ready {
            border-color: var(--cyan);
        }

        .agent-card-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }

        .agent-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .agent-card.running .agent-avatar {
            border-color: var(--green);
            animation: avatarPulse 2s infinite;
        }

        @keyframes avatarPulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .agent-info {
            flex: 1;
        }

        .agent-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .agent-role {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .agent-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .status-running {
            background: rgba(34, 197, 94, 0.2);
            color: var(--green);
            border: 1px solid var(--green);
            animation: pulse 2s infinite;
        }

        .status-ready {
            background: rgba(34, 211, 238, 0.2);
            color: var(--cyan);
            border: 1px solid var(--cyan);
        }

        .status-stopped {
            background: rgba(234, 179, 8, 0.2);
            color: var(--yellow);
            border: 1px solid var(--yellow);
        }

        .status-failed {
            background: rgba(239, 68, 68, 0.2);
            color: var(--red);
            border: 1px solid var(--red);
        }

        .sub-status {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sub-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--cyan);
        }

        .task-center {
            text-align: center;
            margin: 16px 0;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-sm);
        }

        .task-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .mission-name {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .llm-mode {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin: 12px 0;
        }

        .llm-badge {
            background: rgba(34, 211, 238, 0.15);
            color: var(--cyan);
            padding: 2px 8px;
            border-radius: var(--radius-xs);
            font-weight: 600;
        }

        .context-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .context-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease, background 0.5s;
        }

        .context-low { background: var(--green); }
        .context-medium { background: var(--yellow); }
        .context-high { background: var(--red); }

        .context-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: right;
        }

        .last-execution {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-glass);
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .last-execution span {
            white-space: nowrap;
        }

        .timer {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--cyan);
            margin-top: 8px;
            font-variant-numeric: tabular-nums;
        }

        /* Timeline Panel */
        .timeline-panel {
            background: var(--bg-card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 20px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .timeline-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timeline-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-xs);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: var(--transition-smooth);
            color: var(--text-secondary);
        }

        .tab-btn.active {
            background: rgba(34, 211, 238, 0.2);
            color: var(--cyan);
        }

        .timeline-items {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
        }

        .timeline-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 16px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
        }

        .timeline-item.coordinator {
            justify-content: flex-start;
        }

        .timeline-item.agent {
            justify-content: flex-end;
        }

        .timeline-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: var(--transition-smooth);
        }

        .timeline-item.coordinator .timeline-bubble {
            border-top-left-radius: 4px;
            border-left: 2px solid var(--cyan);
        }

        .timeline-item.agent .timeline-bubble {
            border-top-right-radius: 4px;
            border-right: 2px solid var(--purple);
        }

        .timeline-bubble:hover {
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.15);
            border-color: var(--border-neon-cyan);
        }

        .timeline-actor {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .coordinator-actor { color: var(--cyan); }
        .agent-actor { color: var(--purple); }

        .timeline-message {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .timeline-details {
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: none;
        }

        .timeline-item.expanded .timeline-details {
            display: block;
        }

        .timeline-details pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: var(--radius-xs);
            max-height: 200px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 4px;
        }

        .connector {
            width: 2px;
            height: 20px;
            background: var(--border-glass);
            margin: 0 auto;
        }

        .connector.coordinator { background: var(--cyan); }
        .connector.agent { background: var(--purple); }

        /* Loading & Error */
        .loading, .error, .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1rem;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error {
            color: var(--red);
        }

        /* Responsive */
        @media (max-width: 768px) {
            #app {
                padding: 16px;
            }

            .projects-grid, .agents-grid, .teams-grid {
                grid-template-columns: 1fr;
            }

            .team-detail-layout {
                grid-template-columns: 1fr;
            }

            .timeline-panel {
                max-height: 400px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 14px 16px;
            }

            .logo-text {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-left">
                <div class="logo-icon">AF</div>
                <span class="logo-text">Agent Factory</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-back" id="btnBack" onclick="navigateBack()" title="Back">
                    ← Back
                </button>
                <button class="btn" id="btnRefresh" onclick="refreshData()" title="Refresh">
                    ↻
                </button>
            </div>
        </header>

        <!-- Breadcrumb -->
        <div class="breadcrumb" id="breadcrumb"></div>

        <!-- Views -->
        <div id="view-projects" class="view active"></div>
        <div id="view-teams" class="view"></div>
        <div id="view-team-detail" class="view"></div>
    </div>

    <script>
        // ==================== STATE MANAGEMENT ====================
        const state = {
            projects: [],
            missions: [],
            agentsState: {}, // agentId -> { status, subStatus, task, mission, timer, context, lastExecution, events }
            currentView: 'projects',
            currentProjectId: null,
            currentTeamId: null,
            navigationStack: [],
            sseConnection: null,
            connectionStatus: 'connecting',
            eventTimers: {} // agentId -> intervalId for elapsed time
        };

        // ==================== API ====================
        const API = {
            async fetchProjects() {
                const res = await fetch('/api/projects');
                if (!res.ok) throw new Error('Failed to fetch projects');
                return res.json();
            },
            async fetchMissions() {
                const res = await fetch('/api/missions');
                if (!res.ok) throw new Error('Failed to fetch missions');
                return res.json();
            },
            connectSSE() {
                if (state.sseConnection) {
                    state.sseConnection.close();
                }
                state.connectionStatus = 'connecting';
                const es = new EventSource('/api/events/stream');
                es.onopen = () => {
                    state.connectionStatus = 'connected';
                    console.log('SSE connected');
                };
                es.onerror = () => {
                    state.connectionStatus = 'error';
                    console.warn('SSE connection error, reconnecting...');
                    // Reconnect after 5s
                    setTimeout(() => API.connectSSE(), 5000);
                };
                es.addEventListener('agent_event', (e) => {
                    try {
                        const event = JSON.parse(e.data);
                        handleAgentEvent(event);
                    } catch (err) {
                        console.error('Error parsing SSE event:', err);
                    }
                });
                state.sseConnection = es;
            }
        };

        // ==================== EVENT HANDLING ====================
        function handleAgentEvent(event) {
            const agentId = event.agent_id;
            if (!agentId) return;

            // Initialize agent state if not exists
            if (!state.agentsState[agentId]) {
                state.agentsState[agentId] = {
                    status: 'ready',
                    subStatus: '',
                    task: null,
                    mission: null,
                    timer: 0,
                    timerStart: null,
                    context: 0,
                    lastExecution: null,
                    events: []
                };
            }

            const agentState = state.agentsState[agentId];
            
            // Update status
            if (event.status) {
                agentState.status = event.status.toLowerCase();
                // If running, start timer
                if (agentState.status === 'running' && !agentState.timerStart) {
                    agentState.timerStart = Date.now();
                    if (state.eventTimers[agentId]) clearInterval(state.eventTimers[agentId]);
                    state.eventTimers[agentId] = setInterval(() => updateTimer(agentId), 1000);
                } else if (agentState.status !== 'running') {
                    if (state.eventTimers[agentId]) {
                        clearInterval(state.eventTimers[agentId]);
                        delete state.eventTimers[agentId];
                    }
                    agentState.timerStart = null;
                    agentState.timer = 0;
                }
            }

            // Sub-status
            if (event.sub_status || event.message) {
                agentState.subStatus = event.sub_status || event.message.toLowerCase();
            }

            // Task and mission
            if (event.task_id) agentState.task = event.task_id;
            if (event.mission_id) agentState.mission = event.mission_id;
            else if (event.payload && event.payload.mission) agentState.mission = event.payload.mission;

            // Metrics
            if (event.metrics) {
                if (event.metrics.context !== undefined) {
                    agentState.context = event.metrics.context;
                }
            }

            // Last execution
            agentState.lastExecution = {
                timestamp: event.timestamp || new Date().toISOString(),
                mission: agentState.mission,
                task: agentState.task,
                status: agentState.status,
                duration: event.metrics?.duration_ms || 0
            };

            // Add to timeline events
            agentState.events.unshift({
                id: Date.now(),
                type: event.agent_id.includes('coordinator') ? 'coordinator' : 'agent',
                actor: event.agent_id,
                message: event.message || event.status,
                payload: event.payload,
                timestamp: event.timestamp || new Date().toISOString()
            });
            // Keep max 100 events per agent
            if (agentState.events.length > 100) agentState.events.pop();

            // Re-render if currently viewing that agent
            if (state.currentView === 'team-detail') {
                renderTeamDetail();
            }
        }

        function updateTimer(agentId) {
            const agentState = state.agentsState[agentId];
            if (agentState && agentState.timerStart && agentState.status === 'running') {
                const elapsed = Math.floor((Date.now() - agentState.timerStart) / 1000);
                agentState.timer = elapsed;
                // Update timer display
                const timerEl = document.getElementById(`timer-${agentId}`);
                if (timerEl) {
                    timerEl.textContent = formatTime(elapsed);
                }
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // ==================== NAVIGATION ====================
        function navigateTo(view, params = {}) {
            state.navigationStack.push({ view: state.currentView, params: { projectId: state.currentProjectId, teamId: state.currentTeamId } });
            switchView(view, params);
        }

        function navigateBack() {
            if (state.navigationStack.length === 0) return;
            const prev = state.navigationStack.pop();
            switchView(prev.view, prev.params);
        }

        function switchView(view, params = {}) {
            // Hide all views
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            
            // Show requested view
            const viewEl = document.getElementById(`view-${view}`);
            if (viewEl) viewEl.classList.add('active');

            state.currentView = view;
            state.currentProjectId = params.projectId || null;
            state.currentTeamId = params.teamId || null;

            // Update UI
            updateBreadcrumb();
            updateBackButton();
            renderCurrentView();
        }

        function updateBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            bc.innerHTML = '';
            const items = [];
            items.push({ label: 'Projects', action: () => switchView('projects') });
            
            if (state.currentProjectId) {
                const project = state.projects.find(p => p.id === state.currentProjectId);
                items.push({ label: project?.name || state.currentProjectId, action: () => switchView('teams', { projectId: state.currentProjectId }) });
            }
            if (state.currentTeamId && state.currentProjectId) {
                const project = state.projects.find(p => p.id === state.currentProjectId);
                const team = project?.teams?.find(t => t.id === state.currentTeamId);
                items.push({ label: team?.name || state.currentTeamId, action: () => {} });
            }

            items.forEach((item, index) => {
                if (index > 0) {
                    const sep = document.createElement('span');
                    sep.className = 'separator';
                    sep.textContent = '/';
                    bc.appendChild(sep);
                }
                const span = document.createElement('span');
                span.textContent = item.label;
                span.addEventListener('click', item.action);
                bc.appendChild(span);
            });
        }

        function updateBackButton() {
            const btnBack = document.getElementById('btnBack');
            btnBack.style.display = state.currentView === 'projects' ? 'none' : 'flex';
        }

        // ==================== RENDER FUNCTIONS ====================
        function renderCurrentView() {
            switch (state.currentView) {
                case 'projects':
                    renderProjects();
                    break;
                case 'teams':
                    renderTeams();
                    break;
                case 'team-detail':
                    renderTeamDetail();
                    break;
                default:
                    renderProjects();
            }
        }

        function renderProjects() {
            const container = document.getElementById('view-projects');
            if (!state.projects || state.projects.length === 0) {
                container.innerHTML = '<div class="empty-state">No projects found</div>';
                return;
            }

            let html = '<div class="projects-grid">';
            state.projects.forEach(project => {
                const teamsCount = project.teams?.length || 0;
                const agentsCount = project.teams?.reduce((sum, team) => sum + (team.agents?.length || 0), 0) || 0;
                const totalExecutions = project.total_executions || 0; // Assuming data has it
                const activeAgents = project.active_agents || 0; // from real-time state
                // Calculate active agents from our state
                let activeCount = 0;
                project.teams?.forEach(team => {
                    team.agents?.forEach(agent => {
                        const agentState = state.agentsState[agent.id];
                        if (agentState && agentState.status === 'running') activeCount++;
                    });
                });

                html += `
                <div class="project-card" onclick="navigateTo('teams', { projectId: '${project.id}' })">
                    <div class="project-name">${project.name || project.id}</div>
                    <div class="project-stats">
                        <div class="stat-item">
                            <span class="stat-label">Teams</span>
                            <span class="stat-value">${teamsCount}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Agents</span>
                            <span class="stat-value purple">${agentsCount}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Executions</span>
                            <span class="stat-value">${totalExecutions}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Active</span>
                            <span class="stat-value purple">${activeCount}</span>
                        </div>
                    </div>
                    <div class="active-agents">
                        <span class="pulse-dot"></span>
                        ${activeCount} agent${activeCount !== 1 ? 's' : ''} running
                    </div>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderTeams() {
            const container = document.getElementById('view-teams');
            const project = state.projects.find(p => p.id === state.currentProjectId);
            if (!project) {
                container.innerHTML = '<div class="error">Project not found</div>';
                return;
            }
            if (!project.teams || project.teams.length === 0) {
                container.innerHTML = '<div class="empty-state">No teams in this project</div>';
                return;
            }

            let html = '<div class="teams-grid">';
            project.teams.forEach(team => {
                const agentsCount = team.agents?.length || 0;
                html += `
                <div class="team-card" onclick="navigateTo('team-detail', { projectId: '${project.id}', teamId: '${team.id}' })">
                    <div class="team-name">${team.name || team.id}</div>
                    <div class="team-meta">
                        <span>${agentsCount} agents</span>
                        <span>ID: ${team.id}</span>
                    </div>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderTeamDetail() {
            const container = document.getElementById('view-team-detail');
            const project = state.projects.find(p => p.id === state.currentProjectId);
            if (!project) {
                container.innerHTML = '<div class="error">Project not found</div>';
                return;
            }
            const team = project.teams?.find(t => t.id === state.currentTeamId);
            if (!team) {
                container.innerHTML = '<div class="error">Team not found</div>';
                return;
            }

            let agentsHtml = '';
            if (!team.agents || team.agents.length === 0) {
                agentsHtml = '<div class="empty-state">No agents in this team</div>';
            } else {
                agentsHtml = '<div class="agents-grid">';
                team.agents.forEach(agent => {
                    const agentState = state.agentsState[agent.id] || {
                        status: 'ready',
                        subStatus: 'idle',
                        task: null,
                        mission: null,
                        timer: 0,
                        timerStart: null,
                        context: 0,
                        lastExecution: null,
                        events: []
                    };
                    const statusClass = agentState.status;
                    const contextPct = agentState.context || 0;
                    let contextClass = 'context-low';
                    if (contextPct >= 80) contextClass = 'context-high';
                    else if (contextPct >= 50) contextClass = 'context-medium';

                    // Avatar emoji based on role/agent type
                    const emoji = getAgentEmoji(agent.role || agent.id);

                    const timerDisplay = agentState.status === 'running' ? `
                        <div class="timer" id="timer-${agent.id}">${formatTime(agentState.timer || 0)}</div>
                    ` : '';

                    const lastExecHtml = agentState.lastExecution ? `
                        <div class="last-execution">
                            <span>${new Date(agentState.lastExecution.timestamp).toLocaleString()}</span>
                            <span>• ${agentState.lastExecution.mission || 'N/A'}</span>
                            <span>• ${agentState.lastExecution.task || 'N/A'}</span>
                            <span>• ${agentState.lastExecution.status}</span>
                            <span>• ${formatDuration(agentState.lastExecution.duration)}</span>
                        </div>
                    ` : '';

                    agentsHtml += `
                    <div class="agent-card ${statusClass}" id="agent-${agent.id}">
                        <div class="agent-card-header">
                            <div class="agent-avatar">${emoji}</div>
                            <div class="agent-info">
                                <div class="agent-name">${agent.name || agent.id}</div>
                                <div class="agent-role">${agent.role || 'Agent'}</div>
                                <div class="agent-status status-${statusClass}">${agentState.status.toUpperCase()}</div>
                                <div class="sub-status">${agentState.subStatus || 'idle'}</div>
                            </div>
                        </div>
                        <div class="task-center">
                            <div class="task-name">${agentState.task || 'No active task'}</div>
                            <div class="mission-name">${agentState.mission || ''}</div>
                        </div>
                        ${timerDisplay}
                        <div class="llm-mode">
                            <span>Mode: <span class="llm-badge">${agent.llm_mode || 'AUTO'}</span></span>
                            <span>${agent.llm_model || 'groq/llama-3.3-70b'}</span>
                        </div>
                        <div class="context-bar">
                            <div class="context-fill ${contextClass}" style="width: ${Math.min(contextPct, 100)}%"></div>
                        </div>
                        <div class="context-text">Context: ${contextPct}%</div>
                        ${lastExecHtml}
                    </div>`;
                });
                agentsHtml += '</div>';
            }

            // Timeline
            let timelineHtml = renderTimeline(team.agents);

            container.innerHTML = `
                <div class="team-detail-layout">
                    <div>
                        <h2 style="margin-bottom: 20px;">${team.name || team.id} — Agents</h2>
                        ${agentsHtml}
                    </div>
                    <div class="timeline-panel">
                        ${timelineHtml}
                    </div>
                </div>
            `;

            // Restart timers for running agents
            team.agents.forEach(agent => {
                const agentState = state.agentsState[agent.id];
                if (agentState && agentState.status === 'running' && !state.eventTimers[agent.id]) {
                    agentState.timerStart = Date.now() - (agentState.timer || 0) * 1000;
                    state.eventTimers[agent.id] = setInterval(() => updateTimer(agent.id), 1000);
                }
            });
        }

        function renderTimeline(agents) {
            // Collect all events from all agents in the team
            let allEvents = [];
            agents.forEach(agent => {
                const agentState = state.agentsState[agent.id];
                if (agentState && agentState.events) {
                    allEvents = allEvents.concat(agentState.events.map(e => ({...e, agentId: agent.id})));
                }
            });
            allEvents.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            // Limit to 50
            allEvents = allEvents.slice(0, 50);

            if (allEvents.length === 0) {
                return `
                    <div class="timeline-header">Interaction Flow</div>
                    <div class="empty-state">No interactions yet</div>
                `;
            }

            let html = `
                <div class="timeline-header">
                    <span>Interaction Flow</span>
                    <div class="timeline-tabs">
                        <button class="tab-btn active">Timeline</button>
                        <button class="tab-btn">Logs</button>
                    </div>
                </div>
                <div class="timeline-items">
            `;

            allEvents.forEach((event, index) => {
                const isCoordinator = event.type === 'coordinator';
                const actorLabel = isCoordinator ? 'Coordinator' : event.actor;
                const actorClass = isCoordinator ? 'coordinator-actor' : 'agent-actor';
                const sideClass = isCoordinator ? 'coordinator' : 'agent';
                
                html += `
                <div class="timeline-item ${sideClass}" onclick="toggleTimelineDetails(this)" data-event-id="${event.id}">
                    <div class="timeline-bubble">
                        <div class="timeline-actor ${actorClass}">${actorLabel}</div>
                        <div class="timeline-message">${event.message || 'Event'}</div>
                        <div class="timeline-details">
                            <strong>Input/Output:</strong>
                            <pre>${event.payload ? JSON.stringify(event.payload, null, 2) : 'No payload'}</pre>
                        </div>
                    </div>
                </div>
                `;
                if (index < allEvents.length - 1) {
                    html += `<div class="connector ${sideClass}"></div>`;
                }
            });

            html += '</div>';
            return html;
        }

        function toggleTimelineDetails(element) {
            element.classList.toggle('expanded');
        }

        function getAgentEmoji(role) {
            const emojis = {
                'coordinator': '🎯',
                'dev': '💻',
                'qa': '🧪',
                'designer': '🎨',
                'planner': '📋',
                'default': '🤖'
            };
            const key = (role || '').toLowerCase();
            return emojis[key] || emojis.default;
        }

        function formatDuration(ms) {
            if (!ms) return '0ms';
            if (ms < 1000) return `${ms}ms`;
            const secs = Math.floor(ms / 1000);
            if (secs < 60) return `${secs}s`;
            const mins = Math.floor(secs / 60);
            const remainingSecs = secs % 60;
            return `${mins}m ${remainingSecs}s`;
        }

        // ==================== INITIALIZATION ====================
        async function loadInitialData() {
            try {
                const [projects, missions] = await Promise.all([
                    API.fetchProjects(),
                    API.fetchMissions()
                ]);
                // Normalize flat API data to nested structure expected by UI
                state.projects = (projects || []).map(p => ({
                    id: p.project_id,
                    name: p.project_name || p.project_id,
                    icon: p.icon || '📁',
                    teams: [{
                        id: p.team_id || p.project_id,
                        name: p.team_name || 'Team',
                        agents: (p.agents || []).map(a => ({ id: a.agent_id, ...a }))
                    }],
                }));
                state.missions = missions;
                // Initialize agent states from normalized projects
                state.projects.forEach(project => {
                    project.teams?.forEach(team => {
                        team.agents?.forEach(agent => {
                            if (!state.agentsState[agent.id]) {
                                state.agentsState[agent.id] = {
                                    status: 'ready',
                                    subStatus: 'idle',
                                    task: null,
                                    mission: null,
                                    timer: 0,
                                    timerStart: null,
                                    context: 0,
                                    lastExecution: null,
                                    events: []
                                };
                            }
                        });
                    });
                });
                renderCurrentView();
            } catch (error) {
                console.error('Failed to load initial data:', error);
                document.getElementById('view-projects').innerHTML = '<div class="error">Failed to load projects. Is the server running?</div>';
            }
        }

        async function refreshData() {
            await loadInitialData();
        }

        // Start application
        document.addEventListener('DOMContentLoaded', () => {
            loadInitialData();
            API.connectSSE();
        });

        // Handle window resize - no specific action needed due to CSS

        // Expose functions to global scope for onclick handlers
        window.navigateTo = navigateTo;
        window.navigateBack = navigateBack;
        window.refreshData = refreshData;
        window.toggleTimelineDetails = toggleTimelineDetails;
    </script>
</body>
</html>

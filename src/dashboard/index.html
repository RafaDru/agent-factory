        function getTaskAgentChain(task) {
            let last = '';
            return task.events
                .map(e => e.actor || e.agentId || '')
                .filter(a => a && a !== '?' && a !== last ? (last = a, true) : false)
                .map(a => `${getAgentEmoji(a)} ${a}`)
                .join(' → ');
        }

        function renderMissionCardV2(mission) {
            const taskList = Object.values(mission.tasks);
            const statusClass = mission.status || 'running';
            const totalTasks = taskList.length;
            const doneTasks = taskList.filter(t => t.status === 'completed' || t.status === 'success').length;
            const failedTasks = taskList.filter(t => t.status === 'failed').length;
            const blockedTasks = taskList.filter(t => t.status === 'blocked').length;

            // Compute start/end from the same sorted event list (guarantees start ≤ end)
            const allEvts = [];
            taskList.forEach(t => { t.events.forEach(e => allEvts.push(e)); });
            allEvts.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)); // ascending
            const missionStart = allEvts.length > 0 ? formatTimestamp(allEvts[0].timestamp) : (mission.timestamp ? formatTimestamp(mission.timestamp) : '');
            const missionEnd = allEvts.length > 0 ? formatTimestamp(allEvts[allEvts.length - 1].timestamp) : '';

            const tasksHtml = taskList.map(task => {
                const tStatusClass = task.status || 'pending';
                const agentEmoji = getAgentEmoji(task.agent);
                const requesterEmoji = getAgentEmoji(task.requestedBy);
                const sortedEvts = [...task.events].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                const taskStart = sortedEvts.length > 0 ? safeTime(sortedEvts[0].timestamp) : '';
                const taskEnd = sortedEvts.length > 0 ? safeTime(sortedEvts[sortedEvts.length - 1].timestamp) : '';

                const chain = getTaskAgentChain(task);
                const interactionCount = task.events.length;

                const interactionsHtml = interactionCount > 0 ? `
                    <div class="mc-task-expand" onclick="toggleMcTaskInteractions(this)">
                        ▶ ${interactionCount} interações
                    </div>
                    <div class="mc-task-interactions">
                        ${task.events.slice(0, 15).map(evt => {
                            const eAgent = evt.actor || evt.agentId || '?';
                            const eMsg = evt.message || '';
                            const eStatus = evt.status || '';
                            const ts = safeTime(evt.timestamp);
                            const eEmoji = getAgentEmoji(eAgent);
                            return `<div class="mc-interaction">
                                <span class="interact-agent">${eEmoji} ${eAgent}</span>
                                <span class="interact-msg">${escapeHtml(eMsg)}</span>
                                <span class="interact-status" style="color:${eStatus === 'completed' || eStatus === 'success' ? 'var(--green)' : eStatus === 'failed' ? 'var(--red)' : 'var(--blue)'}">${eStatus}</span>
                                <span style="font-size:0.6rem;color:var(--text-muted);flex-shrink:0;">${ts}</span>
                            </div>`;
                        }).join('')}
                    </div>
                ` : '';

                return `
                    <div class="mc-task-card status-${tStatusClass}">
                        <div class="mc-task-top">
                            <span class="mc-task-name">${agentEmoji} ${escapeHtml(task.name || task.id)}</span>
                            <span class="mc-task-status ${tStatusClass}">${tStatusClass.toUpperCase()}</span>
                        </div>
                        <div class="mc-task-agent">
                            ${requesterEmoji} <span>${escapeHtml(task.requestedBy)}</span>
                            ${chain ? `<span style="margin-left:6px;font-size:0.75rem;color:var(--text-muted)">→ ${chain}</span>` : ''}
                        </div>
                        <div style="font-size:0.7rem;color:var(--text-muted);margin-top:2px;">
                            ${taskStart ? `<span>⏱ ${taskStart}</span>` : ''}
                            ${taskEnd ? `<span style="margin-left:10px">🏁 ${taskEnd}</span>` : ''}
                        </div>
                        ${interactionsHtml}
                    </div>
                `;
            }).join('');

            const statusIcon = statusClass === 'completed' ? '✅' : statusClass === 'failed' ? '❌' : statusClass === 'blocked' ? '⛔' : '🔄';
            const title = mission.objective && mission.objective !== mission.id
                ? escapeHtml(mission.objective)
                : escapeHtml(mission.id);

            return `
                <div class="mission-card-v2">
                    <div class="mc-header" onclick="toggleMcBody(this)">
                        <div class="mc-header-left">
                            <div class="mc-objective">${title}</div>
                            <div class="mc-meta">
                                <span>📅 ${missionStart}</span>
                                ${missionEnd ? `<span>→ ${missionEnd}</span>` : ''}
                                <span>•</span>
                                <span>${doneTasks}/${totalTasks} tarefas</span>
                                ${failedTasks > 0 ? `<span>• ${failedTasks} falhas</span>` : ''}
                                ${blockedTasks > 0 ? `<span style="color:var(--yellow)">⛔ ${blockedTasks} blocked</span>` : ''}
                            </div>
                        </div>
                        <span class="mc-status-badge ${statusClass}">${statusIcon} ${statusClass.toUpperCase()}</span>
                    </div>
                    <div class="mc-body" style="display:none">
                        <div class="mc-tasks-label">📋 Tarefas (${doneTasks}/${totalTasks})</div>
                        ${tasksHtml}
                    </div>
                </div>
            `;
        }

        function toggleMcBody(el) {
            const body = el.nextElementSibling;
            if (body) {
                body.style.display = body.style.display === 'none' ? 'block' : 'none';
            }
        }

        function toggleMcTaskInteractions(el) {
            const interactions = el.nextElementSibling;
            if (interactions) {
                interactions.classList.toggle('open');
                el.textContent = interactions.classList.contains('open')
                    ? `▼ ${interactions.querySelectorAll('.mc-interaction').length} interações`
                    : `▶ ${interactions.querySelectorAll('.mc-interaction').length} interações`;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function renderLastExecution(projectId) {
            if (!state.missions || state.missions.length === 0) {
                return '<div class="last-execution-section"><div class="last-execution-title">${L.lastExecution}</div><div class="no-execution">${L.noRecentExecutions}</div></div>';
            }

            // Filtrar missoes do projeto (se especificado)
            let missions = state.missions;
            if (projectId) {
                missions = missions.filter(m => m.project_id === projectId || (m.objective || '').includes(projectId));
            }
            if (missions.length === 0) {
                return '';
            }

            // Ordena missões por timestamp decrescente (mais recente primeiro)
            const sortedMissions = [...missions].sort((a, b) => {
                const timeA = new Date(a.timestamp || a.created_at || 0).getTime();
                const timeB = new Date(b.timestamp || b.created_at || 0).getTime();
                return timeB - timeA;
            });

            const lastMission = sortedMissions[0];
            if (!lastMission) {
                return '<div class="last-execution-section"><div class="last-execution-title">${L.lastExecution}</div><div class="no-execution">${L.noRecentExecutions}</div></div>';
            }

            const missionProjectId = lastMission.project_id || projectId || 'unknown';
            const project = state.projects.find(p => p.id === missionProjectId);
            const projectName = project ? project.name : missionProjectId;
            const agentsCount = project ? (project.agents?.length || 0) : '?';
            const status = lastMission.status || 'unknown';
            const timestamp = lastMission.timestamp || lastMission.created_at;
            const formattedTime = timestamp ? formatTimestamp(timestamp) : 'N/A';

            let statusClass = '';
            if (status === 'completed' || status === 'success') statusClass = 'success';
            else if (status === 'failed') statusClass = 'failed';
            else if (status === 'running') statusClass = 'running';

            return `
                <div class="last-execution-section">
                    <div class="last-execution-title">${L.lastExecution}</div>
                    <div class="execution-card" onclick="navigateTo('team-detail', { projectId: '${missionProjectId}' })">
                        <div class="execution-info">
                            <span class="execution-project">${projectName}</span>
                            <span class="execution-details">${agentsCount} ${L.agents} • ${formattedTime}</span>
                        </div>
                        <span class="execution-status ${statusClass}">${status.toUpperCase()}</span>
                    </div>
                </div>
            `;
        }


        function renderTeamDetail() {
            const container = document.getElementById('view-team-detail');
            const project = state.projects.find(p => p.id === state.currentProjectId);
            if (!project) {
                container.innerHTML = '<div class="error">Project not found</div>';
                return;
            }

            let agentsHtml = '';
            if (!project.agents || project.agents.length === 0) {
                agentsHtml = `<div class="empty-state">${L.noAgents}</div>`;
            } else {
                // Helper to generate agent card HTML
                const generateAgentCard = (agent, agentState) => {
                    const statusInfo = getStatusInfo(agentState.status);
                    const lastTaskStatus = agentState.lastTaskStatus || 'idle';
                    const lastStatusInfo = getStatusInfo(lastTaskStatus);
                    const lastLabel = lastTaskStatus === 'idle' ? '-' : lastStatusInfo.label;
                    const contextPct = agentState.context || 0;
                    let contextClass = 'context-low';
                    if (contextPct >= 80) contextClass = 'context-high';
                    else if (contextPct >= 50) contextClass = 'context-medium';
                    const emoji = getAgentEmoji(agent.role || agent.id);
                    const agentKeyStr = agentKey(project.id, agent.id);
                    const timerDisplay = agentState.status === 'running' ? `
                        <div class="timer" id="timer-${agentKeyStr}">${formatTime(agentState.timer || 0)}</div>
                    ` : '';
                    const modelUsed = agentState.lastExecution?.model || null;
                    const lastExecHtml = agentState.lastExecution ? `
                        <div class="last-execution">
                            <span>${formatTimestamp(agentState.lastExecution.timestamp)}</span>
                            <span>• ${agentState.lastExecution.mission || 'N/A'}</span>
                            <span>• ${agentState.lastExecution.task || 'N/A'}</span>
                            <span>• ${agentState.lastExecution.status}</span>
                            <span>• ${formatDuration(agentState.lastExecution.duration)}</span>
                        </div>
                    ` : '';
                    return `
                    <div class="agent-card ${statusInfo.cardClass}" id="agent-${agentKeyStr}" data-agent-id="${agentKeyStr}" data-flash-success="${agentState.flashSuccess ? 'true' : 'false'}">
                        <div class="agent-card-header">
                            <div class="agent-avatar">${emoji}</div>
                            <div class="agent-info">
                                <div class="agent-name">${agent.name || agent.id}</div>
                                <div class="agent-role">${agent.role || 'Agent'}</div>
                                <div class="agent-status ${statusInfo.statusClass}">
                                    <span class="status-dot ${statusInfo.dotClass}"></span>${statusInfo.label}
                                </div>
                                <div class="last-task-badge ${lastStatusInfo.statusClass}">${L.last} ${lastLabel}</div>
                                ${(agentState.status === 'running' || agentState.status === 'completed' || agentState.status === 'success' || agentState.status === 'failed') ? `<div class="sub-status">${agentState.task || agentState.subStatus || L.executing}</div>` : ''}
                            </div>
                            <button class="agent-log-btn" onclick="openAgentLog('${agentKeyStr}')" title="Logs deste agente">📋</button>
                        </div>
                        <div class="task-center">
                            <div class="task-name">${agentState.task || L.noActiveTask}</div>
                            <div class="mission-name">${agentState.mission || ''}</div>
                        </div>
                        ${timerDisplay}
                        <div class="llm-mode">
                            <label for="llm-select-${agentKeyStr}" style="font-size:0.8rem; color: var(--text-secondary);">${L.llm}</label>
                            <select id="llm-select-${agentKeyStr}" class="llm-select" onchange="updateAgentConfig('${agent.id}', this.value)">
                                <option value="AUTO" ${(agent.llm_mode || 'AUTO') === 'AUTO' ? 'selected' : ''}>AUTO</option>
                                <option value="opencode_zen" ${(agent.llm_mode || 'AUTO') === 'opencode_zen' ? 'selected' : ''}>opencode_zen (deepseek-v4-pro)</option>
                                <option value="groq" ${(agent.llm_mode || 'AUTO') === 'groq' ? 'selected' : ''}>groq (llama-3.3-70b)</option>
                                <option value="opencode" ${(agent.llm_mode || 'AUTO') === 'opencode' ? 'selected' : ''}>opencode (deepseek-v4-pro)</option>
                            </select>
                        </div>
                        <div class="last-model">${L.last} <span>${modelUsed || L.noExecutionsYet}</span></div>
                        <div class="context-bar">
                            <div class="context-fill ${contextClass}" style="width: ${Math.min(contextPct, 100)}%"></div>
                        </div>
                        <div class="context-text">Context: ${contextPct}%</div>
                        ${lastExecHtml}
                    </div>`;
                };

                // Group agents
                const groups = {
                    coordenador: [],
                    upstream: [],
                    downstream: []
                };
                project.agents.forEach(agent => {
                    const id = (agent.id || '').toLowerCase();
                    const role = (agent.role || '').toLowerCase();
                    if (id === 'coordenador' || role === 'coordenador') {
                        groups.coordenador.push(agent);
                    } else if (['designer', 'arquiteto', 'negocios'].includes(id) || ['designer', 'arquiteto', 'negocios'].includes(role)) {
                        groups.upstream.push(agent);
                    } else if (['dev', 'qa'].includes(id) || ['dev', 'qa'].includes(role)) {
                        groups.downstream.push(agent);
                    } else {
                        // fallback: put unknown in downstream
                        groups.downstream.push(agent);
                    }
                });

                const groupNames = {
                    coordenador: 'Coordenador',
                    upstream: 'UPSTREAM',
                    downstream: 'DOWNSTREAM'
                };

                agentsHtml = '';
                ['coordenador', 'upstream', 'downstream'].forEach(groupKey => {
                    const agentsInGroup = groups[groupKey];
                    if (agentsInGroup.length === 0) return;
                    agentsHtml += `<div class="team-section"><h3>${groupNames[groupKey]}</h3><div class="agents-grid">`;
                    agentsInGroup.forEach(agent => {
                        const agentState = state.agentsState[agentKey(project.id, agent.id)] || {
                            status: 'ready',
                            subStatus: 'idle',
                            task: null,
                            mission: null,
                            timer: 0,
                            timerStart: null,
                            context: 0,
                            lastExecution: null,
                            events: []
                        };
                        agentsHtml += generateAgentCard(agent, agentState);
                    });
                    agentsHtml += '</div></div>';
                });
            }

            if (!state.projectTab) state.projectTab = 'agents';
            const showAgents = state.projectTab === 'agents';

            const mcHtml = renderProjectMissionControl(project.id);

            container.innerHTML = `
                <div class="team-detail-layout">
                    <div>
                        <h2 style="margin-bottom: 8px;">${project.name}</h2>
                        <div class="mc-nav">
                            <button class="mc-nav-btn ${showAgents ? 'active' : ''}" onclick="switchProjectTab('agents')">👥 ${L.agents}</button>
                            <button class="mc-nav-btn ${!showAgents ? 'active' : ''}" onclick="switchProjectTab('mission-control')">🚀 Mission Control</button>
                        </div>
                        ${showAgents ? agentsHtml : mcHtml}
                    </div>
                </div>
            `;

            // Restart timers for running agents

            // Flash success animation for agents that just completed
            document.querySelectorAll('.agent-card[data-flash-success="true"]').forEach(card => {
                card.classList.add('flash-success');
                const agentKeyFromCard = card.dataset.agentId;
                if (state.agentsState[agentKeyFromCard]) {
                    state.agentsState[agentKeyFromCard].flashSuccess = false;
                }
                setTimeout(() => {
                    card.classList.remove('flash-success');
                }, 1500);
            });
            project.agents.forEach(agent => {
                const key = agentKey(project.id, agent.id);
                const aState = state.agentsState[key];
                if (aState && aState.status === 'running' && !state.eventTimers[key]) {
                    aState.timerStart = Date.now() - (aState.timer || 0) * 1000;
                    state.eventTimers[key] = setInterval(() => updateTimer(key), 1000);
                }
            });

            // Fetch and set LLM config for each agent
            project.agents.forEach(agent => {
                const key = agentKey(project.id, agent.id);
                fetch(`/api/agent-config?agent_id=${encodeURIComponent(agent.id)}`)
                    .then(response => response.json())
                    .then(data => {
                        const selectEl = document.getElementById(`llm-select-${key}`);
                        if (selectEl && data.llm_provider) {
                            selectEl.value = data.llm_provider;
                        }
                    })
                    .catch(err => console.error('Error fetching agent config:', err));
            });

            // Fetch context for project
            API.fetchContext(project.id).then(data => {
                if (data && data.agents) {
                    Object.entries(data.agents).forEach(([agentId, agentContext]) => {
                        const contextPct = agentContext.context_pct || 0;
                        const sizeBytes = agentContext.context_size_bytes || 0;
                        const key = agentKey(project.id, agentId);
                        if (state.agentsState[key]) {
                            state.agentsState[key].context = contextPct;
                        }
                        updateAgentContext(key, contextPct, sizeBytes);
                    });
                }
            }).catch(err => console.error('Error fetching context:', err));
        }


        function getAgentEmoji(role) {
            const emojis = {
                'coordinator': '🎯',
                'dev': '💻',
                'qa': '🧪',
                'designer': '🎨',
                'planner': '📋',
                'default': '🤖'
            };
            const key = (role || '').toLowerCase();
            return emojis[key] || emojis.default;
        }

        function formatDuration(ms) {
            if (!ms) return '0ms';
            if (ms < 1000) return `${ms}ms`;
            const secs = Math.floor(ms / 1000);
            if (secs < 60) return `${secs}s`;
            const mins = Math.floor(secs / 60);
            const remainingSecs = secs % 60;
            return `${mins}m ${remainingSecs}s`;
        }

        function getStatusInfo(status) {
            const s = (status || 'idle').toLowerCase();
            let statusClass, dotClass, label, cardClass;
            if (s === 'running') {
                statusClass = 'status-running';
                dotClass = 'dot-running';
                label = 'RUNNING';
                cardClass = 'running';
            } else if (s === 'completed' || s === 'success') {
                statusClass = 'status-success';
                dotClass = 'dot-success';
                label = 'SUCCESS';
                cardClass = 'success';
            } else if (s === 'failed') {
                statusClass = 'status-failed';
                dotClass = 'dot-failed';
                label = 'FAILED';
                cardClass = 'failed';
            } else {
                statusClass = 'status-idle';
                dotClass = 'dot-idle';
                label = 'IDLE';
                cardClass = 'ready';
            }
            return { statusClass, dotClass, label, cardClass };
        }

        function updateAgentContext(agentId, contextPct, sizeBytes) {
            const card = document.getElementById(`agent-${agentId}`);
            if (!card) return;
            const contextFill = card.querySelector('.context-fill');
            const contextText = card.querySelector('.context-text');
            if (contextFill) {
                const pct = Math.min(Math.max(contextPct || 0, 0), 100);
                contextFill.style.width = pct + '%';
                contextFill.classList.remove('context-low', 'context-medium', 'context-high');
                if (pct >= 80) contextFill.classList.add('context-high');
                else if (pct >= 50) contextFill.classList.add('context-medium');
                else contextFill.classList.add('context-low');
            }
            if (contextText) {
                const kb = sizeBytes ? (sizeBytes / 1024).toFixed(1) : '0.0';
                contextText.textContent = `Context: ${contextPct || 0}% (${kb} KB)`;
            }
        }

        async function updateAgentConfig(agentId, llmProvider) {
            try {
                const response = await fetch('/api/agent-config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: agentId, llm_provider: llmProvider })
                });
                if (!response.ok) {
                    console.error('Failed to update agent config:', response.statusText);
                }
            } catch (error) {
                console.error('Error updating agent config:', error);
            }
        }

        // ==================== INITIALIZATION ====================
        async function loadInitialData() {
            try {
                const [projects, missions] = await Promise.all([
                    API.fetchProjects(),
                    API.fetchMissions()
                ]);

                // -------- Normalização dos dados --------
                state.projects = (projects || []).map(p => ({
                    id: p.project_id,
                    name: p.project_name || p.project_id,
                    icon: p.icon || '📁',
                    agents: (p.agents || []).map(a => ({
                        id: a.agent_id,
                        name: a.agent_name,
                        role: a.role,
                        llm_mode: a.llm_mode,
                        llm_model: a.llm_model,
                        ...a
                    }))
                }));
                // ----------------------------------------

                state.missions = Array.isArray(missions) ? missions : (missions.missions || []);

                // Inicializa estado dos agentes
                state.projects.forEach(project => {
                    project.agents?.forEach(agent => {
                        const key = agentKey(project.id, agent.id);
                        if (!state.agentsState[key]) {
                            state.agentsState[key] = {
                                status: 'ready',
                                subStatus: 'idle',
                                task: null,
                                mission: null,
                                timer: 0,
                                timerStart: null,
                                context: 0,
                                lastExecution: null,
                                lastTaskStatus: null,
                                events: []
                            };
                        }
                    });
                });

                renderCurrentView();
                populateProjectSelector();
            } catch (error) {
                console.error('Failed to load initial data:', error);
                document.getElementById('view-projects').innerHTML = '<div class="error">Failed to load projects. Is the server running?</div>';
            }
        }

        async function refreshData() {
            await loadInitialData();
        }

        async function loadPastEvents() {
            try {
                const controller = new AbortController();
                setTimeout(() => controller.abort(), 5000);
                const res = await fetch('/api/events', { signal: controller.signal });
                if (!res.ok) throw new Error('Failed to fetch events');
                const data = await res.json();
                const events = (data.events || data).reverse();
                if (Array.isArray(events)) {
                    events.forEach(event => {
                        if (typeof handleAgentEvent === 'function') {
                            handleAgentEvent(event);
                        }
                        if (typeof window.addLogEntry === 'function') {
                            window.addLogEntry(event);
                        }
                    });
                }
            } catch (err) {
                console.warn('Error loading past events:', err);
            }
        }

        // Start application
        document.addEventListener('DOMContentLoaded', () => {
            loadInitialData();
            API.connectSSE();
            loadPastEvents();
        });

        // Expose functions globally
        window.navigateTo = navigateTo;
        window.navigateBack = navigateBack;
        window.refreshData = refreshData;
        window.switchProjectTab = switchProjectTab;
        window.toggleMcBody = toggleMcBody;
        window.toggleMcTaskInteractions = toggleMcTaskInteractions;

        function openAgentLog(agentId) {
            const logsPanel = document.getElementById('logs-panel');
            if (logsPanel) {
                logsPanel.style.display = 'block';
            }
            if (typeof updateAgentFilterOptions === 'function') {
                updateAgentFilterOptions();
            }
            const filterAgent = document.getElementById('log-filter-agent');
            if (filterAgent) {
                filterAgent.value = agentId.includes(':') ? agentId.split(':')[1] : agentId;
            }
            if (typeof applyFilters === 'function') {
                applyFilters();
            }
        }

        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const btn = document.getElementById('theme-toggle');
            if (btn) {
                btn.textContent = theme === 'dark' ? '🌙' : '☀️';
            }
        }

        // Initialize theme from localStorage
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
                updateThemeIcon(savedTheme);
            } else {
                // default is dark, icon moon
                updateThemeIcon('dark');
            }
        })();
    </script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    (function() {
        const MAX_ENTRIES = 200;
        const logEntriesContainer = document.getElementById('log-entries');
        const logsPanel = document.getElementById('logs-panel');
        const logsToggle = document.getElementById('logs-toggle');
        const clearBtn = document.getElementById('clear-logs');
        const filterAgent = document.getElementById('log-filter-agent');
        const filterType = document.getElementById('log-filter-type');

        function updateAgentFilterOptions() {
            const agents = new Set();
            if (state.projects) {
                state.projects.forEach(project => {
                    project.agents?.forEach(agent => agents.add(agent.id));
                });
            }
            Object.keys(state.agentsState).forEach(k => agents.add(k.includes(':') ? k.split(':')[1] : k));
            while (filterAgent.options.length > 1) {
                filterAgent.remove(1);
            }
            agents.forEach(id => {
                const option = document.createElement('option');
                option.value = id;
                option.textContent = id;
                filterAgent.appendChild(option);
            });
        }

        window.addLogEntry = function(event) {
            if (!logEntriesContainer) return;
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.dataset.agentId = event.agent_id || '';
            entry.dataset.status = event.status || '';
            entry.dataset.taskId = event.task_id || '';

            const timestamp = formatTimestamp(event.timestamp || new Date().toISOString());
            const agentId = event.agent_id || 'unknown';
            const status = event.status || 'unknown';
            const taskId = event.task_id || 'N/A';

            entry.innerHTML = `
                <span class="timestamp">${timestamp}</span>
                <span class="agent-id">${agentId}</span>
                <span class="status">${status}</span>
                <span class="task-id">${taskId}</span>
            `;

            logEntriesContainer.insertBefore(entry, logEntriesContainer.firstChild);

            while (logEntriesContainer.children.length > MAX_ENTRIES) {
                logEntriesContainer.removeChild(logEntriesContainer.lastChild);
            }

            applyFilters();
        };

        function applyFilters() {
            const agentFilter = filterAgent.value;
            const typeFilter = filterType.value;

            const entries = logEntriesContainer.querySelectorAll('.log-entry');
            entries.forEach(entry => {
                const agentId = entry.dataset.agentId;
                const status = entry.dataset.status;
                let show = true;
                if (agentFilter !== 'all' && agentId !== agentFilter) {
                    show = false;
                }
                if (typeFilter !== 'all' && status !== typeFilter) {
                    show = false;
                }
                entry.style.display = show ? '' : 'none';
            });
        }

        function clearLogs() {
            if (logEntriesContainer) {
                logEntriesContainer.innerHTML = '';
            }
            filterAgent.value = 'all';
            filterType.value = 'all';
            applyFilters();
        }

        // LLM Modal
        let _llmAgentId = null;
        let _llmSelected = null;
        
        function openLlmModal(agentId) {
            _llmAgentId = agentId;
            const btn = document.getElementById('llm-btn-' + agentId);
            const cur = (btn ? btn.textContent.trim() : 'auto').toLowerCase();
            _llmSelected = cur;
            document.getElementById('llm-modal-title').textContent = agentId.charAt(0).toUpperCase() + agentId.slice(1);
            const body = document.getElementById('llm-modal-body');
            body.innerHTML = AVAILABLE_PROVIDERS.map(p => {
                const sel = p.id === cur || p.label.toLowerCase() === cur;
                return `<div class="llm-option ${sel ? 'selected' : ''}" onclick="selectLlmOption('${p.id}')">
                    <input type="radio" class="llm-option-radio" name="llm-radio" value="${p.id}" ${sel ? 'checked' : ''}>
                    <div class="llm-option-info">
                        <div class="llm-option-name">${p.label}</div>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('llm-modal').style.display = 'flex';
        }
        
        function selectLlmOption(id) {
            _llmSelected = id;
            document.querySelectorAll('.llm-option').forEach(el => {
                const rb = el.querySelector('input');
                el.classList.toggle('selected', rb && rb.value === id);
                if (rb && rb.value === id) rb.checked = true;
            });
        }
        
        function closeLlmModal() {
            document.getElementById('llm-modal').style.display = 'none';
            _llmAgentId = null;
        }
        
        async function saveLlmModal() {
            if (!_llmAgentId || !_llmSelected) return;
            try {
                const resp = await fetch('/api/agent-config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: _llmAgentId, llm_provider: _llmSelected })
                });
                if (resp.ok) {
                    const btn = document.getElementById('llm-btn-' + _llmAgentId);
                    if (btn) {
                        const parts = _llmSelected.split(':');
                        btn.textContent = parts.length > 1 ? parts[0] + ' (' + parts[1] + ')' : _llmSelected;
                    }
                }
            } catch(e) { console.error(e); }
            closeLlmModal();
        }
        
        // Hash Navigation
        function onHashChange() {
            const hash = window.location.hash || '#/projects';
            const m = hash.match(/^#\/(\w+)(?:\/([^/]+))?(?:\/([^/]+))?/);
            if (!m) { setView('projects'); return; }
            const [, type, id, tab] = m;
            if (type === 'project' && id) {
                state.projectTab = tab || 'agents';
                setView('team-detail', { projectId: id });
            } else if (type === 'mission-control') {
                setView('live');
            } else if (type === 'config') {
                setView('config');
            } else {
                setView('projects');
            }
        }
        
        function setView(view, params) {
            params = params || {};
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            const el = document.getElementById('view-' + view);
            if (el) el.classList.add('active');
            state.currentView = view;
            state.currentProjectId = params.projectId || null;
            const hash = view === 'projects' ? '#/projects' :
                view === 'team-detail' ? '#/project/' + (params.projectId || '') + '/' + (state.projectTab || 'agents') :
                view === 'live' ? '#/mission-control' :
                view === 'config' ? '#/config' : '#/projects';
            if (window.location.hash !== hash) {
                history.replaceState(null, '', hash);
            }
            if (view === 'projects') renderProjects();
            else if (view === 'team-detail') renderTeamDetail();
            else if (view === 'live') renderCurrentView();
            else if (view === 'config') renderConfig();
            updateNavActive();
            populateProjectSelector();
        }
        

        function updateLogFilterInfo(agentId) {
            const infoDiv = document.getElementById('log-filter-info');
            if (!infoDiv) return;
            const bareId = agentId.includes(':') ? agentId.split(':')[1] : agentId;
            const agentState = state.agentsState[agentId] || Object.values(state.agentsState).find(s => s.lastExecution?.model);
            if (!agentState) {
                infoDiv.style.display = 'none';
                return;
            }
            const lastExec = agentState.lastExecution;
            let modelText = '\u2014';
            if (lastExec && lastExec.model) {
                modelText = lastExec.model;
            }
            infoDiv.innerHTML = `${L.filteredBy} ${bareId} | ${L.last} modelo: ${modelText}`;
            infoDiv.style.display = 'block';
        }




        if (logsToggle && logsPanel) {
            logsToggle.addEventListener('click', () => {
                const isVisible = logsPanel.style.display !== 'none';
                logsPanel.style.display = isVisible ? 'none' : 'block';
                if (!isVisible) {
                    updateAgentFilterOptions();
                }
            });
        }

        if (clearBtn) {
            clearBtn.addEventListener('click', clearLogs);
        }

        if (filterAgent) {
            filterAgent.addEventListener('change', applyFilters);
        }
        if (filterType) {
            filterType.addEventListener('change', applyFilters);
        }

        // Close button for logs panel
        const closeBtn = document.querySelector('.logs-close-btn');
        if (closeBtn && logsPanel) {
            closeBtn.addEventListener('click', () => {
                logsPanel.style.display = 'none';
            });
        }

        // Hash navigation
        window.addEventListener('hashchange', onHashChange);
        onHashChange();
    })();
});
</script>


<!-- Logs Panel Overlay -->
<div id="logs-panel" style="display: none;">
    <div class="logs-panel-header">
        <h2>Event Logs</h2>
        <div class="logs-filters">
            <select id="log-filter-agent">
                <option value="all">All Agents</option>
            </select>
            <select id="log-filter-type">
                <option value="all">All Types</option>
                <option value="status">Status</option>
                <option value="error">Error</option>
                <option value="complete">Complete</option>
            </select>
        </div>
        <button class="logs-close-btn" title="Close logs">✕</button>
    </div>
    <div class="log-filter-info" id="log-filter-info" style="display:none;"></div>
    
<div id="log-entries" class="log-entries"></div>
    <button id="clear-logs" class="btn">Clear</button>
</div>

</body>
</html>

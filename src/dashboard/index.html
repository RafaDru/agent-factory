<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Factory Platform - Dashboard</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-surface: rgba(20, 20, 30, 0.7);
            --bg-overlay: rgba(30, 30, 45, 0.8);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-cyan: #22d3ee;
            --accent-purple: #a855f7;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
            --sp-1: 4px;
            --sp-2: 8px;
            --sp-3: 12px;
            --sp-4: 16px;
            --sp-5: 20px;
            --sp-6: 24px;
            --sp-8: 32px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --transition-fast: 150ms ease;
            --transition-normal: 250ms ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* Glass Morphism Base Styles */
        .glass-card {
            background: var(--bg-surface);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--sp-4);
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(34, 211, 238, 0.3),
                transparent
            );
        }

        /* Neon Accents */
        .neon-glow {
            box-shadow:
                0 0 10px rgba(34, 211, 238, 0.3),
                0 0 20px rgba(168, 85, 247, 0.2),
                0 0 30px rgba(34, 211, 238, 0.1);
            border: 1px solid rgba(34, 211, 238, 0.2);
        }

        .neon-border {
            position: relative;
        }

        .neon-border::after {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: linear-gradient(
                135deg,
                rgba(34, 211, 238, 0.3),
                rgba(168, 85, 247, 0.3),
                rgba(34, 211, 238, 0.3)
            );
            border-radius: var(--radius-lg);
            z-index: -1;
            animation: neonPulse 2s infinite alternate;
        }

        @keyframes neonPulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* Status Animations */
        .pulse-running {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .pulse-fade {
            animation: pulseFade 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes pulseFade {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: var(--sp-1) var(--sp-3);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: relative;
            overflow: hidden;
        }

        .status-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, currentColor, transparent);
        }

        .status-running {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #000;
            box-shadow: 0 0 8px rgba(34, 211, 238, 0.5);
        }

        .status-ready {
            background: var(--success);
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
        }

        .status-stopped {
            background: var(--text-secondary);
            box-shadow: 0 0 8px rgba(148, 163, 184, 0.5);
        }

        .status-failed {
            background: var(--error);
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }

        /* Context Bar */
        .context-bar {
            height: 4px;
            border-radius: 2px;
            margin-top: var(--sp-2);
            background: linear-gradient(90deg, transparent, currentColor, transparent);
        }

        .context-low {
            background: var(--success);
        }

        .context-medium {
            background: var(--warning);
        }

        .context-high {
            background: var(--error);
        }

        /* Timeline Styles */
        .timeline {
            position: relative;
            padding: var(--sp-4) 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom,
                transparent,
                var(--accent-cyan),
                transparent
            );
            transform: translateX(-50%);
        }

        .timeline-item {
            position: relative;
            padding: var(--sp-3) 0;
            cursor: pointer;
            margin-bottom: var(--sp-4);
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--accent-cyan);
            background: var(--bg-primary);
            z-index: 1;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom,
                transparent,
                var(--accent-cyan),
                transparent
            );
            transform: translateX(-50%);
        }

        .timeline-content {
            position: relative;
            z-index: 2;
            max-width: 45%;
        }

        .timeline-content.left {
            margin-left: 5%;
        }

        .timeline-content.right {
            margin-left: 55%;
        }

        .timeline-message {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--sp-3);
            margin-bottom: var(--sp-2);
            position: relative;
        }

        .timeline-message::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 20px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid var(--bg-surface);
        }

        .timeline-message.coordinator::after {
            left: auto;
            right: 20px;
            border-top: none;
            border-bottom: 8px solid var(--bg-surface);
        }

        /* Agent Card Specific Styles */
        .agent-card {
            transition: all var(--transition-normal);
            position: relative;
        }

        .agent-card:hover {
            transform: translateY(-8px);
            box-shadow:
                0 10px 20px rgba(34, 211, 238, 0.2),
                0 15px 30px rgba(168, 85, 247, 0.1);
        }

        .agent-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }

        .agent-status-container {
            position: relative;
            display: inline-block;
        }

        .agent-status-container::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            z-index: -1;
            opacity: 0;
            transition: opacity var(--transition-normal);
        }

        .agent-card:hover .agent-status-container::after {
            opacity: 0.3;
        }

        /* Project and Team Cards */
        .project-card, .team-card {
            transition: all var(--transition-normal);
        }

        .project-card:hover, .team-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(34, 211, 238, 0.2);
        }

        /* Project Card Specific Styles */
        .project-card {
            cursor: pointer;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--sp-4);
        }

        .project-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--sp-3);
            margin-top: var(--sp-3);
        }

        .stat-item {
            text-align: center;
            padding: var(--sp-2);
            background: rgba(34, 211, 238, 0.1);
            border-radius: var(--radius-md);
            border: 1px solid rgba(34, 211, 238, 0.2);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-cyan);
            margin-bottom: var(--sp-1);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Team Card Specific Styles */
        .team-card {
            cursor: pointer;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--sp-4);
        }

        .team-meta {
            display: flex;
            gap: var(--sp-2);
            flex-wrap: wrap;
        }

        .team-meta-item {
            display: flex;
            align-items: center;
            gap: var(--sp-1);
            padding: var(--sp-1) var(--sp-2);
            background: rgba(168, 85, 247, 0.1);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(168, 85, 247, 0.2);
            font-size: 0.75rem;
        }

        .team-agents {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: var(--sp-3);
            margin-top: var(--sp-3);
        }

        .team-agent-count {
            display: flex;
            align-items: center;
            gap: var(--sp-1);
            padding: var(--sp-2);
            background: rgba(34, 211, 238, 0.1);
            border-radius: var(--radius-md);
            border: 1px solid rgba(34, 211, 238, 0.2);
        }

        /* Utility Classes */
        .hidden {
            display: none !important;
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-overlay {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            padding: var(--sp-4);
            border: 1px solid var(--border);
        }

        /* Agent Grid Styles */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--sp-4);
            margin-top: var(--sp-4);
        }

        .agent-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--sp-4);
            position: relative;
            transition: all var(--transition-normal);
        }

        .agent-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--sp-3);
        }

        .agent-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }

        .agent-status-main {
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .agent-status-sub {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: var(--sp-1);
        }

        .agent-timer {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: var(--sp-1);
        }

        .agent-task-info {
            text-align: center;
            margin: var(--sp-3) 0;
        }

        .agent-task-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: var(--sp-1);
        }

        .agent-mission-name {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .agent-llm-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--sp-2);
            margin: var(--sp-2) 0;
            font-size: 0.8rem;
        }

        .llm-mode {
            padding: var(--sp-1) var(--sp-2);
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .llm-mode.auto {
            background: rgba(34, 211, 238, 0.2);
            color: var(--accent
